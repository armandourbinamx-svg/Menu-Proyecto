<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DON APULEYO - Menú Digital Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #E32636;
  --bg: #FDFDFD;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --accent: #FF9F43;
}

@media (prefers-color-scheme: dark) {
  :root { --bg: #121212; --card: #1E1E1E; --text: #F5F6FA; --text-light: #A0A0A0; }
}

body { margin:0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }

header { background: var(--card); padding: 25px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
header h1 { margin:0; font-size: 24px; color: var(--primary); letter-spacing: 2px; }

#categorias {
  display: flex; overflow-x: auto; gap: 10px; padding: 15px;
  background: var(--card); position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(0,0,0,0.05);
}
#categorias::-webkit-scrollbar { display: none; }

.categoria-btn {
  flex: 0 0 auto; padding: 10px 20px; border-radius: 50px;
  border: 1px solid rgba(0,0,0,0.1); background: var(--card);
  color: var(--text-light); cursor: pointer; font-weight: 600;
}
.categoria-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

#menu-container { padding: 15px; padding-bottom: 350px; }

.product {
  background: var(--card); padding: 15px; border-radius: 20px;
  margin-bottom: 15px; display: flex; align-items: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.product-info { flex: 1; }
.product-info .name { font-weight: 700; font-size: 16px; }
.product-info .desc { font-size: 12px; color: var(--text-light); margin: 4px 0; }
.product-info .price { font-weight: 700; color: var(--primary); }

.controls { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 12px; padding: 4px; }
.controls button { width: 30px; height: 30px; border: none; background: var(--card); border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--text); }
.qty { margin: 0 10px; font-weight: 700; min-width: 15px; text-align: center; }

.cart {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); padding: 20px;
  border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
}

#entrega-options { display: flex; gap: 8px; margin-bottom: 15px; }
.entrega-btn {
  flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
  background: var(--bg); color: var(--text-light); font-size: 12px; font-weight: 600; cursor: pointer;
}
.entrega-btn.active { background: var(--text); color: white; }

.orderbtn {
  width: 100%; padding: 18px; border-radius: 15px; border: none;
  background: #ccc; color: white; font-weight: 700; font-size: 16px;
}
.orderbtn.ready { background: var(--primary); cursor: pointer; }

.total-display { display: flex; justify-content: space-between; font-weight: 700; font-size: 20px; margin-bottom: 15px; }
textarea { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: var(--bg); color: var(--text); margin-bottom: 10px; }
</style>
</head>
<body>

<header><h1>DON APULEYO</h1></header>

<div id="categorias">
  </div>

<div id="menu-container"></div>

<div class="cart">
  <div class="total-display"><span>Total:</span><span>$<span id="total">0</span></span></div>
  
  <div id="entrega-options">
    <button class="entrega-btn active" data-val="Para llevar">🛍️ Para llevar</button>
    <button class="entrega-btn" data-val="Domicilio">🛵 Domicilio</button>
    <button class="entrega-btn" data-val="En sucursal">🍽️ En sitio</button>
  </div>

  <textarea id="notas" rows="2" placeholder="Notas (ej. sin cebolla, traer cambio...)"></textarea>
  <button class="orderbtn" id="enviarBtn">Selecciona productos</button>
</div>

<script>
const telefono = "521XXXXXXXXXX"; // Pon tu número aquí
const menu = [
  // ANTOJITOS
  {cat:"Antojitos", n:"Tlacoyo", p:12},
  {cat:"Antojitos", n:"Taco suadero", p:14},
  {cat:"Antojitos", n:"Sopes sencillo", p:20},
  {cat:"Antojitos", n:"Huarache con suadero", p:45},
  // HAMBURGUESAS
  {cat:"Hamburguesas", n:"Sencilla", p:55, d:"Carne, lechuga, tomate"},
  {cat:"Hamburguesas", n:"Hawaiana", p:65, d:"Carne, queso y piña"},
  {cat:"Hamburguesas", n:"Especial", p:65},
  // PIZZAS
  {cat:"Pizzas", n:"Chica (Hawaiana/Española/Peperoni)", p:85},
  {cat:"Pizzas", n:"Grande (Hawaiana/Española/Peperoni)", p:205},
  // POSTRES
  {cat:"Postres", n:"Fresas con crema", p:25},
  {cat:"Postres", n:"Pay de limón", p:25},
  {cat:"Postres", n:"Cheesecake de oreo", p:40},
  // BEBIDAS
  {cat:"Bebidas", n:"Refresco", p:25},
  {cat:"Bebidas", n:"Agua natural", p:20},
  {cat:"Bebidas", n:"Café", p:15}
];

let carrito = {};
let catActual = "Hamburguesas";

function init(){
  const cats = [...new Set(menu.map(i => i.cat))];
  const catDiv = document.getElementById("categorias");
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = `categoria-btn ${c === catActual ? 'active' : ''}`;
    btn.innerText = c;
    btn.onclick = () => {
      document.querySelectorAll(".categoria-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      catActual = c;
      render();
    };
    catDiv.appendChild(btn);
  });
  render();
}

function render(){
  const container = document.getElementById("menu-container");
  container.innerHTML = "";
  menu.filter(i => i.cat === catActual).forEach(i => {
    const div = document.createElement("div");
    div.className = "product";
    div.innerHTML = `
      <div class="product-info">
        <div class="name">${i.n}</div>
        <div class="desc">${i.d || ''}</div>
        <div class="price">$${i.p}</div>
      </div>
      <div class="controls">
        <button onclick="changeQty('${i.n}', -1)">-</button>
        <span class="qty">${carrito[i.n]?.q || 0}</span>
        <button onclick="changeQty('${i.n}', 1)">+</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function changeQty(name, delta){
  const item = menu.find(i => i.n === name);
  if(!carrito[name]) carrito[name] = {q:0, p:item.p};
  carrito[name].q = Math.max(0, carrito[name].q + delta);
  if(carrito[name].q === 0) delete carrito[name];
  updateCart();
  render();
}

function updateCart(){
  let total = 0;
  for(let key in carrito) total += (carrito[key].q * carrito[key].p);
  document.getElementById("total").innerText = total;
  const btn = document.getElementById("enviarBtn");
  btn.className = total > 0 ? "orderbtn ready" : "orderbtn";
  btn.innerText = total > 0 ? "Enviar Pedido a WhatsApp" : "Selecciona productos";
}

document.querySelectorAll(".entrega-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".entrega-btn").forEach(btn => btn.classList.remove("active"));
    b.classList.add("active");
  };
});

document.getElementById("enviarBtn").onclick = () => {
  let total = document.getElementById("total").innerText;
  if(total === "0") return;
  
  let entrega = document.querySelector(".entrega-btn.active").dataset.val;
  let msg = `*ORDEN - DON APULEYO*%0A*Modo:* ${entrega}%0A%0A`;
  for(let key in carrito) msg += `• ${carrito[key].q}x ${key} ($${carrito[key].q * carrito[key].p})%0A`;
  
  const notas = document.getElementById("notas").value;
  if(notas) msg += `%0A*Notas:* ${notas}`;
  msg += `%0A%0A*TOTAL: $${total}*`;
  window.open(`https://wa.me/${telefono}?text=${msg}`);
};

init();
</script>
</body>
</html>
