<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #C00000; /* Rojo Intenso Sangre */
  --primary-dark: #800000;
  --accent: #FFB703; /* Amarillo Mostaza para destacados */
  --bg: #FDFDFD;
  --card: #FFFFFF;
  --text-main: #1A1A1A;
  --text-muted: #666666;
}

body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background-color: var(--bg);
  color: var(--text-main);
  -webkit-tap-highlight-color: transparent;
}

/* Header con estilo Glass */
header {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  padding: 25px 15px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid var(--primary);
}

header h1 {
  margin: 0;
  font-size: 22px;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
  text-transform: uppercase;
}

/* Categorías tipo Chips */
#categorias {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 15px;
  background: var(--bg);
}
#categorias::-webkit-scrollbar { display: none; }

.categoria-btn {
  flex: 0 0 auto;
  padding: 10px 22px;
  border-radius: 15px;
  border: 1px solid #EEE;
  background: var(--card);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.categoria-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(192, 0, 0, 0.2);
}

/* Grid de Productos */
#menu-container {
  padding: 15px;
  padding-bottom: 380px;
  display: grid;
  gap: 15px;
}

.product {
  background: var(--card);
  border-radius: 24px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.03);
  border: 1px solid #F0F0F0;
  animation: fadeInUp 0.5s ease backwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.badge-popular {
  align-self: flex-start;
  background: var(--accent);
  color: #000;
  font-size: 10px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 8px;
  margin-bottom: -5px;
}

.product-body {
  display: flex;
  align-items: center;
  gap: 15px;
}

.product-img {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  object-fit: cover;
  background: #F5F5F5;
}

.product-info { flex: 1; }
.product-info .name { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
.product-info .desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
.product-info .price { 
    font-weight: 800; 
    color: var(--primary); 
    font-size: 18px; 
    margin-top: 8px;
}

/* Controles de Cantidad */
.controls {
  display: flex;
  align-items: center;
  background: #F8F8F8;
  border-radius: 16px;
  padding: 5px;
  gap: 12px;
}

.controls button {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s;
}

.controls button:active { transform: scale(0.9); }
.qty { font-weight: 800; font-size: 16px; min-width: 20px; text-align: center; }

/* Extras Premium */
.extras-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 5px;
}

.extra-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 6px 14px;
  background: #F0F0F0;
  border-radius: 10px;
  color: #555;
  border: 2px solid transparent;
}

.extra-pill.selected {
  background: #FFF0F0;
  border-color: var(--primary);
  color: var(--primary);
}

/* Carrito Estilo Moderno */
.cart {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  padding: 25px;
  border-radius: 35px 35px 0 0;
  box-shadow: 0 -15px 40px rgba(0,0,0,0.1);
  z-index: 1001;
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.total-label { font-weight: 600; color: var(--text-muted); }
.total-amount { font-weight: 800; font-size: 24px; color: var(--primary); }

textarea {
  width: 100%;
  border: 1.5px solid #EEE;
  border-radius: 18px;
  padding: 15px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 15px;
  box-sizing: border-box;
}

#entrega {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.entrega-btn {
  flex: 1;
  padding: 12px;
  border-radius: 15px;
  border: 1.5px solid #EEE;
  background: #F9F9F9;
  font-weight: 700;
  font-size: 12px;
  color: var(--text-muted);
}

.entrega-btn.active {
  background: var(--text-main);
  color: white;
  border-color: var(--text-main);
}

.orderbtn {
  width: 100%;
  padding: 20px;
  border-radius: 20px;
  border: none;
  background: #E0E0E0;
  color: white;
  font-weight: 800;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s;
}

.orderbtn.ready {
  background: var(--primary);
  box-shadow: 0 10px 25px rgba(192, 0, 0, 0.3);
}
</style>
</head>
<body>

<header>
  <h1>Cenaduría Don Apuleyo</h1>
</header>

<div id="categorias"></div>
<div id="menu-container"></div>

<div class="cart">
  <div class="total-row">
    <span class="total-label">Total a pagar</span>
    <span class="total-amount">$<span id="total">0</span></span>
  </div>
  
  <textarea id="notas" rows="2" placeholder="¿Alguna especificación? (ej. Sin cebolla, traer cambio de $500)"></textarea>
  
  <div id="entrega">
    <button class="entrega-btn active" data-type="Para llevar">🛍️ LLEVAR</button>
    <button class="entrega-btn" data-type="Domicilio">🛵 DOMICILIO</button>
    <button class="entrega-btn" data-type="En sitio">🍽️ EN SITIO</button>
  </div>
  
  <button class="orderbtn" id="btnEnviar">Añade productos</button>
</div>

<script>
// DATOS DEL MENÚ (Digitalizados de tu volante)
const productos = [
  {id:1, cat:"Antojitos", n:"Tlacoyo", d:"Frijol o haba", p:12, pop:true},
  {id:2, cat:"Antojitos", n:"Sope sencillo", d:"Frijol, lechuga y queso", p:20, pop:false, ex:[{n:"Quesillo", p:5}]},
  {id:3, cat:"Antojitos", n:"Huarache suadero", d:"Tamaño grande", p:45, pop:true, ex:[{n:"Quesillo", p:5}]},
  {id:4, cat:"Hamburguesas", n:"Sencilla", d:"Carne res, lechuga, jitomate", p:55, pop:false, ex:[{n:"Papas", p:15},{n:"Queso", p:10}]},
  {id:5, cat:"Hamburguesas", n:"Hawaiana", d:"Queso fundido y piña", p:65, pop:true, ex:[{n:"Tocino", p:15}]},
  {id:6, cat:"Hot-Dogs", n:"Sencillo", d:"Salchicha clásica", p:18, pop:false},
  {id:7, cat:"Hot-Dogs", n:"Especial", d:"Tocino y quesillo", p:23, pop:true},
  {id:8, cat:"Pizzas", n:"Pizza Chica", d:"Hawaiana / Peperoni", p:85, pop:false},
  {id:9, cat:"Snacks", n:"Alitas con papas", d:"6 pzas", p:75, pop:true},
  {id:10, cat:"Bebidas", n:"Refresco 600ml", d:"Varios sabores", p:25, pop:false}
];

let carrito = {};
let catActual = "Antojitos";

function init() {
  const ctn = document.getElementById("categorias");
  const cats = [...new Set(productos.map(p => p.cat))];
  cats.forEach(c => {
    const b = document.createElement("button");
    b.className = `categoria-btn ${c===catActual?'active':''}`;
    b.innerText = c;
    b.onclick = () => {
      document.querySelectorAll(".categoria-btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      catActual = c;
      render();
    };
    ctn.appendChild(b);
  });
  render();
}

function render() {
  const container = document.getElementById("menu-container");
  container.innerHTML = "";
  productos.filter(p => p.cat === catActual).forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    const badge = p.pop ? `<div class="badge-popular">FAVORITO ✨</div>` : '';
    let extras = p.ex ? `<div class="extras-container">` + p.ex.map(e => `<div class="extra-pill ${carrito[p.id]?.extras?.includes(e.n)?'selected':''}" onclick="toggleExtra(${p.id},'${e.n}',${e.p})">+ ${e.n} ($${e.p})</div>`).join('') + `</div>` : '';

    div.innerHTML = `${badge}<div class="product-body"><img class="product-img" src="https://via.placeholder.com/150/C00000/FFFFFF?text=${p.n[0]}"><div class="product-info"><div class="name">${p.n}</div><div class="desc">${p.d}</div><div class="price">$${p.p}</div></div><div class="controls"><button onclick="update(${p.id},-1)">-</button><span class="qty">${carrito[p.id]?.q || 0}</span><button onclick="update(${p.id},1)">+</button></div></div>${extras}`;
    container.appendChild(div);
  });
}

function update(id, delta) {
  if(!carrito[id]) carrito[id] = {q:0, extras:[], exP:0};
  carrito[id].q = Math.max(0, carrito[id].q + delta);
  if(carrito[id].q === 0) delete carrito[id];
  actualizar();
}

function toggleExtra(id, nombre, precio) {
  if(!carrito[id]) return alert("Añade el producto primero");
  const idx = carrito[id].extras.indexOf(nombre);
  if(idx > -1) {
    carrito[id].extras.splice(idx, 1);
    carrito[id].exP -= precio;
  } else {
    carrito[id].extras.push(nombre);
    carrito[id].exP += precio;
  }
  actualizar();
}

function actualizar() {
  let total = 0;
  for(let id in carrito) {
    const p = productos.find(x => x.id == id);
    total += (p.p + carrito[id].exP) * carrito[id].q;
  }
  document.getElementById("total").innerText = total;
  const btn = document.getElementById("btnEnviar");
  btn.className = total > 0 ? "orderbtn ready" : "orderbtn";
  btn.innerText = total > 0 ? "PEDIR POR WHATSAPP" : "Añade productos";
  render();
}

document.getElementById("btnEnviar").onclick = () => {
  let total = document.getElementById("total").innerText;
  if(total == "0") return;
  let tipo = document.querySelector(".entrega-btn.active").dataset.type;
  let msg = `*DON APULEYO - PEDIDO*%0A*Entrega:* ${tipo}%0A%0A`;
  for(let id in carrito) {
    const p = productos.find(x => x.id == id);
    msg += `• *${carrito[id].q}x ${p.n}*`;
    if(carrito[id].extras.length > 0) msg += ` _(Extras: ${carrito[id].extras.join(', ')})_`;
    msg += ` -> $${(p.p + carrito[id].exP) * carrito[id].q}%0A`;
  }
  msg += `%0A*Notas:* ${document.getElementById("notas").value}%0A*TOTAL: $${total}*`;
  window.open(`https://wa.me/521XXXXXXXXXX?text=${msg}`);
};

document.querySelectorAll(".entrega-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".entrega-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  };
});

init();
</script>
</body>
</html>
