<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Menú Interactivo</title>
<style>
html, body {margin:0; padding:0; height:100%; font-family:'Helvetica Neue', Arial, sans-serif; background:#ffffff; color:#4B3621; position:relative;}

/* Fondo animado siluetas sutiles */
body::before{
  content:"";
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text x="0" y="20" font-size="20" fill="%23FFDAB9">🍔</text><text x="50" y="50" font-size="20" fill="%23FFDAB9">🍕</text><text x="20" y="80" font-size="20" fill="%23FFDAB9">🌭</text></svg>') repeat;
  opacity:0.05; animation:moveBg 30s linear infinite; z-index:-1;
}
@keyframes moveBg{0%{background-position:0 0;}100%{background-position:1000px 1000px;}}

header{
  background:#D97D38;
  text-align:center;
  padding:20px 0;
  color:white;
  box-shadow:0 4px 6px rgba(0,0,0,0.2);
}
header h1{
  margin:0; font-size:28px; font-weight:bold; text-shadow:1px 1px 4px rgba(0,0,0,0.3);
}

/* Categorías horizontal */
#categorias, #entrega{
  display:flex; overflow-x:auto; gap:12px; padding:10px; scroll-behavior:smooth;
}
.categoria-btn, .entrega-btn{
  flex:0 0 auto;
  padding:8px 20px; border-radius:25px; border:none; cursor:pointer; color:white; background:#B35C1A; font-weight:bold; transition:0.3s;
}
.categoria-btn.active, .entrega-btn.active{background:#D97D38;}
.categoria-btn:hover, .entrega-btn:hover{transform:scale(1.05);}

/* Contenedor menú */
#menu-container{padding:15px; padding-bottom:220px; height:calc(100% - 140px); overflow-y:auto; position:relative;}
.menu-slide{position:absolute; top:0; left:100%; width:100%; transition:all 0.5s ease; opacity:0;}
.menu-slide.active{left:0; opacity:1;}

/* Productos */
.product{
  display:flex; justify-content:space-between; background:#fefefe; padding:12px; border-radius:15px; margin-top:12px; box-shadow:0 4px 6px rgba(0,0,0,0.08); transition:transform 0.25s;
}
.product:hover{transform:scale(1.02);}
.product-info{display:flex; flex-direction:column; max-width:60%;}
.product-info .name{font-weight:bold; font-size:17px;}
.product-info .desc{font-size:14px; color:#7A5A42; margin-top:4px;}
.product-info .price{font-size:16px; color:#4B3621; margin-top:5px; transition:0.2s;}
.product-info .price:hover{color:#FF0000;}
.product-img{width:60px; height:60px; border-radius:10px; margin-right:12px; object-fit:cover;}

/* Controles +/− */
.controls{display:flex; align-items:center; gap:10px;}
.controls button{padding:6px 14px; border:none; border-radius:8px; cursor:pointer; background:#D97D38; color:white; font-weight:bold; transition:0.2s;}
.controls button:hover{background:#B35C1A;}
.qty{min-width:25px; text-align:center; font-weight:bold;}

/* Animación burbuja */
.bubble{
  position:absolute; border-radius:50%; width:28px; height:28px; background:#D97D38; color:white; text-align:center; line-height:28px; font-size:15px; font-weight:bold;
  animation:rise 1s ease-out forwards;
}
@keyframes rise{0%{opacity:1; transform:translateY(0) scale(1);}100%{opacity:0; transform:translateY(-60px) scale(1.5);}}

/* Carrito */
.cart{
  position:fixed; bottom:0; left:0; right:0; background:#F5E6D3; padding:15px; display:flex; flex-direction:column; align-items:center; gap:12px; box-shadow:0 -2px 8px rgba(0,0,0,0.15);
}
.cart-summary{width:92%; max-height:160px; overflow-y:auto; background:white; border-radius:12px; padding:12px;}
.cart-summary ul{padding:0; margin:0; list-style:none;}
.cart-summary li{margin-bottom:6px; color:#4B3621;}
textarea{width:92%; padding:12px; border-radius:10px; border:1px solid #D97D38; resize:none; font-size:15px; background:#ffffff; color:#4B3621;}
.orderbtn{padding:14px 28px; border-radius:35px; border:none; background:#4B3621; color:white; cursor:pointer; font-size:19px; width:92%; font-weight:bold; transition:0.25s;}
.orderbtn:hover{background:#7A5A42;}

/* Responsive */
@media(max-width:600px){
  .product-info{max-width:55%;}
  .categoria-btn, .entrega-btn{padding:8px 15px; font-size:14px;}
  .product-img{width:50px; height:50px;}
}
</style>
</head>
<body>

<header>
  <h1>CENADURÍA DON APULEYO</h1>
</header>

<!-- Categorías -->
<div id="categorias">
  <button class="categoria-btn active" data-cat="Hamburguesas">Hamburguesas</button>
  <button class="categoria-btn" data-cat="Hot Dog">Hot Dog</button>
  <button class="categoria-btn" data-cat="Postres">Postres</button>
  <button class="categoria-btn" data-cat="Quesadillas fritas">Quesadillas fritas</button>
  <button class="categoria-btn" data-cat="Antojito Mexicano">Antojito Mexicano</button>
</div>

<div id="menu-container"></div>

<!-- Carrito -->
<div class="cart">
  <div class="cart-summary"><ul id="cart-list"></ul></div>
  <div>Total: $<span id="total">0</span></div>
  <textarea id="comentarios" rows="2" placeholder="Comentarios o especificaciones"></textarea>
  <div id="entrega">
    <button class="entrega-btn active" data-type="llevar">Para llevar</button>
    <button class="entrega-btn" data-type="domicilio">Entrega a domicilio</button>
    <button class="entrega-btn" data-type="sitio">Para el sitio</button>
  </div>
  <button class="orderbtn" id="enviarPedidoBtn">Enviar pedido</button>
</div>

<script>
// Número de WhatsApp
const telefono="521XXXXXXXXXX"; // cambia por tu número

const productos=[
  {cat:"Hamburguesas",nombre:"Sencilla",desc:"Carne, lechuga y tomate",precio:65,img:"https://i.imgur.com/5K7BReZ.jpg"},
  {cat:"Hamburguesas",nombre:"Hawaiana",desc:"Carne, piña y queso",precio:65,img:"https://i.imgur.com/5K7BReZ.jpg"},
  {cat:"Hot Dog",nombre:"Sencillo",desc:"Salchicha y pan fresco",precio:18,img:"https://i.imgur.com/FyOcl4K.jpg"},
  {cat:"Postres",nombre:"Fresas con crema",desc:"Fresas frescas con crema",precio:25,img:"https://i.imgur.com/6oZk6M3.jpg"},
  {cat:"Quesadillas fritas",nombre:"Queso",desc:"Quesadilla frita de queso",precio:18,img:"https://i.imgur.com/5K7BReZ.jpg"},
  {cat:"Antojito Mexicano",nombre:"Tlacoyos",desc:"Antojito mexicano tradicional",precio:12,img:"https://i.imgur.com/5K7BReZ.jpg"},
  // agrega el resto de productos
];

let cantidades=new Array(productos.length).fill(0);
let categoriaActual="Hamburguesas";
const menuContainer=document.getElementById("menu-container");

function renderProductos(){
  const newSlide=document.createElement("div");
  newSlide.className="menu-slide";
  productos.forEach((p,i)=>{
    if(p.cat===categoriaActual){
      const div=document.createElement("div");
      div.className="product";
      div.innerHTML=`
        <img class="product-img" src="${p.img}" alt="${p.nombre}">
        <div class="product-info">
          <div class="name">${p.nombre}</div>
          <div class="desc">${p.desc}</div>
          <div class="price">$${p.precio}</div>
        </div>
        <div class="controls">
          <button data-index="${i}" class="restar">-</button>
          <span id="q${i}" class="qty">${cantidades[i]}</span>
          <button data-index="${i}" class="sumar">+</button>
        </div>
      `;
      newSlide.appendChild(div);
    }
  });
  menuContainer.appendChild(newSlide);
  setTimeout(()=>{newSlide.classList.add("active");},50);
  const slides=menuContainer.querySelectorAll(".menu-slide");
  if(slides.length>1){ slides[0].remove(); }

  newSlide.querySelectorAll(".sumar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      cantidades[i]++;
      document.getElementById("q"+i).innerText=cantidades[i];
      actualizarCarrito();
      crearBurbuja(btn,"+1");
    });
  });
  newSlide.querySelectorAll(".restar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      if(cantidades[i]>0){ cantidades[i]--; document.getElementById("q"+i).innerText=cantidades[i]; actualizarCarrito(); crearBurbuja(btn,"-1"); }
    });
  });
}

function crearBurbuja(element,text){
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;
  element.parentElement.appendChild(bubble);
  setTimeout(()=>{bubble.remove();},1000);
}

function actualizarCarrito(){
  const cartList=document.getElementById("cart-list");
  cartList.innerHTML="";
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      cartList.innerHTML+=`<li>${cantidades[i]} x ${p.nombre} - $${cantidades[i]*p.precio}</li>`;
      total+=cantidades[i]*p.precio;
    }
  });
  document.getElementById("total").innerText=total;
}

function enviarPedido(){
  let tipoEntrega=document.querySelector(".entrega-btn.active").innerText;
  let pedido=`Hola, quiero pedir (${tipoEntrega}):%0A`;
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      pedido+=cantidades[i]+" "+p.nombre+" - $"+(cantidades[i]*p.precio)+"%0A";
      total+=cantidades[i]*p.precio;
    }
  });
  pedido+="Total: $"+total+"%0A";
  const comentarios=document.getElementById("comentarios").value;
  if(comentarios.trim()!=""){ pedido+="Comentarios: "+comentarios; }
  window.open(`https://wa.me/${telefono}?text=${pedido}`);
}

// Categorías
document.querySelectorAll(".categoria-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".categoria-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    categoriaActual=btn.dataset.cat;
    renderProductos();
  });
});

// Tipo de entrega
document.querySelectorAll(".entrega-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".entrega-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("enviarPedidoBtn").addEventListener("click", enviarPedido);

renderProductos();
</script>

</body>
</html>
