<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURIA DON APULEYO</title>
<style>
body, html {margin:0; padding:0; font-family:'Arial', sans-serif;}
body {background:#1c1c1c; color:white; overflow-x:hidden; position:relative;}
header{background:#ff5722; text-align:center; padding:25px 0;}
header h1{margin:0;}
#categorias{display:flex; justify-content:center; gap:15px; margin:15px 0;}
.categoria-btn{padding:8px 15px; border-radius:20px; border:none; cursor:pointer; color:white; background:#2c2c2c;}
.categoria-btn.active{background:#ff5722;}
#menu{padding:15px;}
.product{display:flex; justify-content:space-between; background:#2c2c2c; padding:15px; border-radius:12px; margin-top:10px;}
.controls button{padding:5px 12px; border:none; border-radius:6px; cursor:pointer; margin:0 2px; background:#ff9800; color:#1c1c1c;}
.controls button:hover{background:#ffc107;}
.cart{position:fixed; bottom:0; left:0; right:0; background:#121212; padding:15px; display:flex; flex-direction:column; align-items:center; gap:10px;}
textarea{width:90%; padding:10px; border-radius:8px; border:none; resize:none; background:#2c2c2c; color:white;}
.orderbtn{padding:12px 25px; border-radius:30px; border:none; background:#25D366; color:white; cursor:pointer; font-size:18px; width:90%;}
.orderbtn:hover{background:#1ed760;}
#entrega{display:flex; justify-content:center; gap:10px; margin-top:10px;}
.entrega-btn{padding:8px 15px; border-radius:20px; border:none; background:#ff9800; cursor:pointer;}
.entrega-btn.active{background:#ffc107; color:black;}
.entrega-btn:hover{transform: scale(1.1);}
</style>
</head>
<body>

<header>
  <h1>CENADURIA DON APULEYO</h1>
</header>

<div id="categorias">
  <button class="categoria-btn active" data-cat="Hamburguesas">Hamburguesas</button>
  <button class="categoria-btn" data-cat="Hot Dog">Hot Dog</button>
  <button class="categoria-btn" data-cat="Postres">Postres</button>
</div>

<div id="menu"></div>

<div class="cart">
  <div class="cart-summary"><ul id="cart-list"></ul></div>
  <div>Total: $<span id="total">0</span></div>
  <textarea id="comentarios" rows="2" placeholder="Comentarios"></textarea>
  <div id="entrega">
    <button class="entrega-btn active" data-type="llevar">Para llevar</button>
    <button class="entrega-btn" data-type="domicilio">Entrega a domicilio</button>
    <button class="entrega-btn" data-type="sitio">Para el sitio</button>
  </div>
  <button class="orderbtn" id="enviarPedidoBtn">Enviar pedido</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const telefono="521XXXXXXXXXX"; // tu número
const productos=[
{cat:"Hamburguesas",nombre:"Sencilla",precio:65},
{cat:"Hamburguesas",nombre:"Hawaiana",precio:65},
{cat:"Hamburguesas",nombre:"Especial",precio:65},
{cat:"Hot Dog",nombre:"Sencillo",precio:18},
{cat:"Hot Dog",nombre:"Con tocino o queso",precio:20},
{cat:"Hot Dog",nombre:"Con tocino y queso",precio:23},
{cat:"Postres",nombre:"Fresas con crema",precio:25},
{cat:"Postres",nombre:"Duraznos con crema",precio:25},
{cat:"Postres",nombre:"Ensalada de manzana",precio:25},
{cat:"Postres",nombre:"Tapioca con manzana y crema",precio:25},
{cat:"Postres",nombre:"Trigo con uva y crema",precio:25},
{cat:"Postres",nombre:"Gelatina de refresco",precio:25},
{cat:"Postres",nombre:"Arroz con leche",precio:25},
{cat:"Postres",nombre:"Flan vainilla",precio:25},
{cat:"Postres",nombre:"Flan napolitano",precio:25},
{cat:"Postres",nombre:"Pay de limón",precio:20},
{cat:"Postres",nombre:"Cheesecake zarzamora",precio:25},
{cat:"Postres",nombre:"Cheesecake oreo",precio:25},
{cat:"Postres",nombre:"Tartaleta chica",precio:40}
];

let cantidades=new Array(productos.length).fill(0);
let categoriaActual="Hamburguesas";

function renderProductos(){
  const menu=document.getElementById("menu");
  menu.innerHTML="";
  productos.forEach((p,i)=>{
    if(p.cat===categoriaActual){
      const div=document.createElement("div");
      div.className="product";
      div.innerHTML=`
        <div>
          <div class="name">${p.nombre}</div>
          <div class="price">$${p.precio}</div>
        </div>
        <div class="controls">
          <button data-index="${i}" class="restar">-</button>
          <span id="q${i}">${cantidades[i]}</span>
          <button data-index="${i}" class="sumar">+</button>
        </div>
      `;
      menu.appendChild(div);
    }
  });

  // asignar eventos a los botones + y -
  document.querySelectorAll(".sumar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      cantidades[i]++;
      document.getElementById("q"+i).innerText=cantidades[i];
      actualizarCarrito();
    });
  });
  document.querySelectorAll(".restar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      if(cantidades[i]>0){ cantidades[i]--; document.getElementById("q"+i).innerText=cantidades[i]; actualizarCarrito(); }
    });
  });
}

function actualizarCarrito(){
  const cartList=document.getElementById("cart-list");
  cartList.innerHTML="";
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      cartList.innerHTML+=`<li>${cantidades[i]} x ${p.nombre} - $${cantidades[i]*p.precio}</li>`;
      total+=cantidades[i]*p.precio;
    }
  });
  document.getElementById("total").innerText=total;
}

function enviarPedido(){
  let tipoEntrega=document.querySelector(".entrega-btn.active").innerText;
  let pedido=`Hola, quiero pedir (${tipoEntrega}):%0A`;
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      pedido+=cantidades[i]+" "+p.nombre+" - $"+(cantidades[i]*p.precio)+"%0A";
      total+=cantidades[i]*p.precio;
    }
  });
  pedido+="Total: $"+total+"%0A";
  const comentarios=document.getElementById("comentarios").value;
  if(comentarios.trim()!=""){ pedido+="Comentarios: "+comentarios; }
  window.open(`https://wa.me/${telefono}?text=${pedido}`);
}

// Categorías
document.querySelectorAll(".categoria-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".categoria-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    categoriaActual=btn.dataset.cat;
    renderProductos();
  });
});

// Tipo de entrega
document.querySelectorAll(".entrega-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".entrega-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("enviarPedidoBtn").addEventListener("click", enviarPedido);

renderProductos();

});
</script>

</body>
</html>
