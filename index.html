<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DON APULEYO - Menú Profesional</title>
<style>
  body {
    background-color: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #ffcc00;
    margin-bottom: 20px;
  }

  #menu {
    max-height: 70vh; /* Menú con scroll */
    overflow-y: auto;
    padding-right: 5px;
  }

  .category {
    margin-top: 15px;
    font-size: 1.1em;
    font-weight: bold;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
  }

  .product {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #222;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
    font-size: 0.9em;
    flex-wrap: wrap;
  }

  .product-info {
    flex: 1;
    min-width: 150px;
  }

  .name {
    font-weight: bold;
  }

  .price {
    color: #ffcc00;
    margin-top: 3px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  button {
    background-color: #ffcc00;
    border: none;
    padding: 5px 10px;
    font-size: 0.9em;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background-color: #ffaa00;
  }

  .qty {
    min-width: 25px;
    text-align: center;
  }

  .comentarios {
    margin-top: 3px;
    width: 100%;
    padding: 4px;
    border-radius: 5px;
    border: none;
    font-size: 0.8em;
  }

  #total-container {
    margin-top: 15px;
    font-size: 1.2em;
    font-weight: bold;
    text-align: right;
  }

  #enviar {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    font-size: 1.1em;
    font-weight: bold;
    border-radius: 10px;
    background-color: #ffcc00;
    color: #111;
    cursor: pointer;
    border: none;
  }

  #enviar:hover {
    background-color: #ffaa00;
  }
</style>
</head>
<body>

<h1>DON APULEYO</h1>

<div id="menu"></div>

<div id="total-container">Total: $<span id="total">0</span></div>
<button id="enviar" onclick="enviarPedido()">Enviar pedido</button>

<script>
// Lista de productos de ejemplo (puedes agregar más)
let productos = [
  {cat:"Hamburguesas", nombre:"Sencilla", precio:65},
  {cat:"Hamburguesas", nombre:"Hawaiana", precio:65},
  {cat:"Hamburguesas", nombre:"Especial", precio:65},
  {cat:"Hot Dog", nombre:"Sencillo", precio:18},
  {cat:"Bebidas", nombre:"Refresco 500ml", precio:20},
  {cat:"Bebidas", nombre:"Agua 500ml", precio:15},
  // Puedes agregar aquí más productos
];

let cantidades = new Array(productos.length).fill(0);
let telefono = "5211234567890"; // Tu WhatsApp internacional

function render() {
  let menu = document.getElementById("menu");
  menu.innerHTML = "";
  let actual = "";
  productos.forEach((p, i) => {
    if (p.cat != actual) {
      menu.innerHTML += `<div class="category">${p.cat}</div>`;
      actual = p.cat;
    }
    menu.innerHTML += `
      <div class="product">
        <div class="product-info">
          <div class="name">${p.nombre}</div>
          <div class="price">$${p.precio}</div>
          <input type="text" class="comentarios" id="c${i}" placeholder="Comentarios / Especificaciones">
        </div>
        <div class="controls">
          <button onclick="restar(${i})">-</button>
          <div class="qty" id="q${i}">0</div>
          <button onclick="sumar(${i})">+</button>
        </div>
      </div>
    `;
  });
}

function sumar(i) {
  cantidades[i]++;
  document.getElementById("q"+i).innerText = cantidades[i];
  actualizarTotal();
}

function restar(i) {
  if (cantidades[i] > 0) {
    cantidades[i]--;
    document.getElementById("q"+i).innerText = cantidades[i];
    actualizarTotal();
  }
}

function actualizarTotal() {
  let total = 0;
  productos.forEach((p,i) => total += p.precio * cantidades[i]);
  document.getElementById("total").innerText = total;
}

function enviarPedido() {
  let pedido = "Hola, quiero pedir:%0A";
  let total = 0;

  productos.forEach((p,i) => {
    if (cantidades[i] > 0) {
      let comentario = document.getElementById("c"+i).value.trim();
      pedido += `${cantidades[i]} ${p.nombre}`;
      if (comentario != "") pedido += ` (${comentario})`;
      pedido += `%0A`;
      total += cantidades[i] * p.precio;
    }
  });

  pedido += `Total: $${total}%0A`;

  window.open(`https://wa.me/${telefono}?text=${pedido}`);
}

render();
</script>

</body>
</html>
