<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DON APULEYO - Menú</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  margin:0;
}
header{
  background:#000;
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #333;
}
.container{
  padding:15px;
}
.category{
  margin-top:25px;
  font-size:20px;
  color:#ff9800;
}
.product{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1a1a1a;
  padding:12px;
  border-radius:8px;
  margin-top:10px;
}
.name{
  font-size:16px;
}
.price{
  color:#4caf50;
  font-size:14px;
}
.controls{
  display:flex;
  align-items:center;
}
button{
  background:#ff9800;
  border:none;
  color:black;
  font-size:18px;
  padding:5px 10px;
  border-radius:5px;
}
.qty{
  margin:0 10px;
}
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  border-top:1px solid #333;
  padding:15px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.orderbtn{
  background:#25D366;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:25px;
  font-size:16px;
  width:90%;
}
textarea{
  width:90%;
  padding:8px;
  border-radius:5px;
  border:none;
  resize:none;
}
</style>
</head>

<body>

<header> CENADURIA<br>DON APULEYO</br></header>

<div class="container" id="menu"></div>

<div class="cart">
<div>Total: $<span id="total">0</span></div>
<textarea id="comentarios" rows="2" placeholder="Nota para el pedio"></textarea>
<button class="orderbtn" onclick="enviarPedido()">Enviar pedido</button>
</div>

<script>

let telefono="525615265368" // Pon tu número aquí

let productos=[
{cat:"Hamburguesas",nombre:"Hamburguesa sencilla",precio:65},
{cat:"Hamburguesas",nombre:"Hamburguesa hawaiana",precio:65},
{cat:"Hamburguesas",nombre:"Hamburguesa especial",precio:65},

{cat:"Hot Dog",nombre:"Hot Dog sencillo",precio:18},
{cat:"Hot Dog",nombre:"Hot Dog con queso",precio:20},
 {cat:"Hot Dog",nombre:"Hot Dog tocino",precio:20},
{cat:"Hot Dog",nombre:"Hot Dog con tocino y queso",precio:23},

{cat:"Postres",nombre:"Fresas con crema",precio:25},
{cat:"Postres",nombre:"Duraznos con crema",precio:25},
{cat:"Postres",nombre:"Ensalada de manzana",precio:25},
{cat:"Postres",nombre:"Tapioca con manzana y crema",precio:25},
{cat:"Postres",nombre:"Trigo con uva y crema",precio:25},
{cat:"Postres",nombre:"Gelatina de refresco",precio:25},
{cat:"Postres",nombre:"Arroz con leche",precio:25},
{cat:"Postres",nombre:"Flan vainilla",precio:25},
{cat:"Postres",nombre:"Flan napolitano",precio:25},
{cat:"Postres",nombre:"Pay de limón",precio:20},
{cat:"Postres",nombre:"Cheesecake zarzamora",precio:25},
{cat:"Postres",nombre:"Cheesecake oreo",precio:25},
{cat:"Postres",nombre:"Tartaleta chica",precio:40}
]

let cantidades=new Array(productos.length).fill(0)

function render(){
let menu=document.getElementById("menu")
let actual=""
productos.forEach((p,i)=>{
if(p.cat!=actual){
menu.innerHTML+=`<div class="category">${p.cat}</div>`
actual=p.cat
}
menu.innerHTML+=`
<div class="product">
<div>
<div class="name">${p.nombre}</div>
<div class="price">$${p.precio}</div>
</div>
<div class="controls">
<button onclick="restar(${i})">-</button>
<div class="qty" id="q${i}">0</div>
<button onclick="sumar(${i})">+</button>
</div>
</div>
`
})
}

function sumar(i){
cantidades[i]++
document.getElementById("q"+i).innerText=cantidades[i]
actualizarTotal()
}

function restar(i){
if(cantidades[i]>0){
cantidades[i]--
document.getElementById("q"+i).innerText=cantidades[i]
actualizarTotal()
}
}

function actualizarTotal(){
let total=0
productos.forEach((p,i)=>{
total+=p.precio*cantidades[i]
})
document.getElementById("total").innerText=total
}

function enviarPedido(){
let pedido=`Hola, quiero pedir:%0A`
let total=0
productos.forEach((p,i)=>{
if(cantidades[i]>0){
pedido+=cantidades[i]+" "+p.nombre+"%0A"
total+=cantidades[i]*p.precio
}
})
pedido+=`Total: $${total}%0A`
let comentarios=document.getElementById("comentarios").value
if(comentarios.trim()!=""){
pedido+=`Comentarios: ${comentarios}`
}
window.open(`https://wa.me/${teléfono}?text=${pedido}`)
}

render()

</script>

</body>
</html>
