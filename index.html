<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cenaduría Don Apuleyo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#D90429;
--secondary:#FFB703;
--bg:#F7F7F7;
--card:#ffffff;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
color:#222;
}

/* HEADER */

header{
background:white;
text-align:center;
padding:25px;
border-bottom:4px solid var(--primary);
}

.logo{
font-size:28px;
font-weight:800;
color:var(--primary);
}

.status{
margin-top:8px;
font-size:12px;
font-weight:700;
}

.open{color:#2e7d32;}
.closed{color:#c62828;}

/* RECOMENDADOS */

#recom{
padding:15px;
}

.recom-title{
font-weight:800;
margin-bottom:10px;
}

.recom-list{
display:flex;
overflow-x:auto;
gap:12px;
}

.recom-card{
min-width:160px;
background:white;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,.1);
overflow:hidden;
}

.recom-card img{
width:100%;
height:110px;
object-fit:cover;
}

.recom-info{
padding:10px;
font-size:13px;
font-weight:600;
}

/* CATEGORIAS */

#cats{
display:flex;
overflow:auto;
gap:10px;
padding:10px 15px;
background:white;
position:sticky;
top:0;
z-index:10;
}

.cat{
flex:0 0 auto;
padding:8px 14px;
border-radius:20px;
border:1px solid #eee;
font-weight:700;
font-size:13px;
background:white;
}

.cat.active{
background:var(--primary);
color:white;
}

/* MENU */

#menu{
padding:15px;
padding-bottom:200px;
}

.product{
background:white;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
overflow:hidden;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-weight:800;
font-size:18px;
display:flex;
justify-content:space-between;
}

.fire{
font-size:18px;
}

.desc{
font-size:13px;
color:#777;
margin-top:4px;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.price{
font-weight:800;
font-size:20px;
color:var(--primary);
}

.qtybox{
display:flex;
gap:10px;
align-items:center;
}

.qtybox button{
width:34px;
height:34px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-weight:800;
font-size:18px;
}

.qty{
font-weight:800;
}

/* CARRITO FLOTANTE */

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:20px;
border-radius:30px 30px 0 0;
box-shadow:0 -10px 40px rgba(0,0,0,.15);
}

.total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:800;
}

textarea{
width:100%;
margin-top:10px;
border-radius:12px;
padding:10px;
border:1px solid #eee;
resize:none;
}

.types{
display:flex;
gap:8px;
margin-top:10px;
}

.type{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #eee;
font-size:12px;
font-weight:700;
}

.type.active{
background:#222;
color:white;
}

.order{
margin-top:12px;
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:var(--primary);
color:white;
font-weight:800;
font-size:16px;
}

</style>
</head>

<body>

<header>

<div class="logo">Cenaduría Don Apuleyo</div>
<div id="status" class="status"></div>

</header>

<div id="recom">

<div class="recom-title">🔥 Recomendados</div>

<div class="recom-list" id="recomList"></div>

</div>

<div id="cats"></div>

<div id="menu"></div>

<div class="cart">

<div class="total">
<span>Total</span>
<span>$<span id="total">0</span></span>
</div>

<textarea id="obs" placeholder="Notas o dirección"></textarea>

<div class="types">

<button class="type active" data="Llevar">Llevar</button>
<button class="type" data="Domicilio">Domicilio</button>
<button class="type" data="En sitio">En sitio</button>

</div>

<button class="order" onclick="send()">PEDIR POR WHATSAPP</button>

</div>

<script>

const WA="521XXXXXXXXXX"

const menu=[

{id:1,c:"Antojitos",n:"Tlacoyo",d:"Frijol o haba",p:12,pop:1,img:""},
{id:2,c:"Antojitos",n:"Taco de suadero",d:"Doble tortilla",p:14,img:""},
{id:3,c:"Antojitos",n:"Huarache suadero",d:"Grande con quesillo",p:45,pop:1,img:""},
{id:4,c:"Hamburguesas",n:"Hamburguesa sencilla",d:"100% res",p:55,img:""},
{id:5,c:"Postres",n:"Fresas con crema",d:"Especial de la casa",p:25,pop:1,img:""},
{id:6,c:"Bebidas",n:"Refresco 600ml",d:"Coca, Sprite, Fanta",p:25,img:""}

]

let cart={}
let cat="Antojitos"

function horario(){

let h=new Date()
let d=h.getDay()
let hr=h.getHours()

let open=[5,6,0].includes(d)&&hr>=20&&hr<23

let s=document.getElementById("status")

if(open){
s.innerText="● ABIERTO AHORA"
s.className="status open"
}else{
s.innerText="● CERRADO (Vie-Dom 8-11)"
s.className="status closed"
}

return open

}

function init(){

let cats=[...new Set(menu.map(x=>x.c))]
let box=document.getElementById("cats")

cats.forEach(a=>{

let b=document.createElement("button")

b.className="cat"+(a==cat?" active":"")
b.innerText=a

b.onclick=()=>{
cat=a
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
render()
}

box.appendChild(b)

})

renderRecom()
render()
horario()

}

function renderRecom(){

let r=document.getElementById("recomList")

menu.filter(x=>x.pop).forEach(p=>{

let d=document.createElement("div")
d.className="recom-card"

d.innerHTML=`

<img src="${p.img}">

<div class="recom-info">
${p.n}
</div>

`

r.appendChild(d)

})

}

function render(){

let m=document.getElementById("menu")
m.innerHTML=""

menu.filter(x=>x.c==cat).forEach(p=>{

let q=cart[p.id]?.q||0

let div=document.createElement("div")
div.className="product"

let img=p.img?`<img src="${p.img}">`:""

div.innerHTML=`

${img}

<div class="info">

<div class="name">

${p.n}

${p.pop?'<span class="fire">🔥</span>':''}

</div>

<div class="desc">${p.d}</div>

<div class="controls">

<div class="price">$${p.p}</div>

<div class="qtybox">

<button onclick="add(${p.id},-1)">-</button>

<div class="qty">${q}</div>

<button onclick="add(${p.id},1)">+</button>

</div>

</div>

</div>

`

m.appendChild(div)

})

}

function add(id,d){

if(!cart[id])cart[id]={q:0}

cart[id].q=Math.max(0,cart[id].q+d)

if(cart[id].q==0)delete cart[id]

refresh()

}

function refresh(){

let t=0

for(let id in cart){

let item=menu.find(x=>x.id==id)

t+=item.p*cart[id].q

}

document.getElementById("total").innerText=t

render()

}

function send(){

if(!horario()){
alert("Estamos cerrados")
return
}

let total=document.getElementById("total").innerText

if(total==0)return

let notes=document.getElementById("obs").value

let txt="*CENADURÍA DON APULEYO*%0A%0A"

for(let id in cart){

let item=menu.find(x=>x.id==id)

txt+=`${cart[id].q}x ${item.n}%0A`

}

txt+=`%0A*Total:* $${total}%0A`

txt+=`Notas: ${notes}`

window.open(`https://wa.me/${WA}?text=${txt}`)

}

document.querySelectorAll(".type").forEach(b=>{

b.onclick=()=>{
document.querySelectorAll(".type").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
}

})

init()

</script>

</body>
</html>
