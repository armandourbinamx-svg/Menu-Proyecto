<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:15px;
font-size:22px;
}

.container{
padding:15px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:15px;
display:flex;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.product img{
width:80px;
height:80px;
border-radius:10px;
margin-right:10px;
}

.info{
flex:1;
}

.name{
font-weight:bold;
}

.price{
color:green;
}

.controls{
display:flex;
align-items:center;
}

button{
background:#ff5722;
color:white;
border:none;
padding:5px 10px;
font-size:18px;
border-radius:5px;
}

.qty{
margin:0 8px;
}

.order{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#25D366;
color:white;
padding:15px 25px;
border-radius:30px;
font-size:18px;
}

</style>

</head>

<body>

<header>Menú</header>

<div class="container" id="menu"></div>

<button class="order" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>

<script>

let telefono = "521XXXXXXXXXX"

let productos = [

{nombre:"Hamburguesa Sencilla",precio:65,img:"https://i.imgur.com/VZ8K8.png"},
{nombre:"Hamburguesa Hawaiana",precio:65,img:"https://i.imgur.com/VZ8K8.png"},
{nombre:"Hamburguesa Especial",precio:65,img:"https://i.imgur.com/VZ8K8.png"},

{nombre:"Hot Dog Sencillo",precio:18,img:"https://i.imgur.com/3d1qH.png"},
{nombre:"Hot Dog Tocino o Queso",precio:20,img:"https://i.imgur.com/3d1qH.png"},
{nombre:"Hot Dog Tocino y Queso",precio:23,img:"https://i.imgur.com/3d1qH.png"},

{nombre:"Fresas con crema",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Duraznos con crema",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Ensalada de manzana",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Tapioca con manzana y crema",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Trigo con uva y crema",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Gelatina de refresco",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Arroz con leche",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Flan vainilla",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Flan napolitano",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Pay de limón",precio:20,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Cheesecake zarzamora",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Cheesecake oreo",precio:25,img:"https://i.imgur.com/yP6G8.png"},
{nombre:"Tartaleta chica",precio:40,img:"https://i.imgur.com/yP6G8.png"}

]

let cantidades = new Array(productos.length).fill(0)

function renderMenu(){

let menu = document.getElementById("menu")

productos.forEach((p,i)=>{

menu.innerHTML += `
<div class="product">

<img src="${p.img}">

<div class="info">
<div class="name">${p.nombre}</div>
<div class="price">$${p.precio}</div>
</div>

<div class="controls">

<button onclick="restar(${i})">-</button>

<div class="qty" id="q${i}">0</div>

<button onclick="sumar(${i})">+</button>

</div>

</div>
`

})

}

function sumar(i){
cantidades[i]++
document.getElementById("q"+i).innerText=cantidades[i]
}

function restar(i){
if(cantidades[i]>0){
cantidades[i]--
document.getElementById("q"+i).innerText=cantidades[i]
}
}

function enviarPedido(){

let pedido="Hola quiero pedir:%0A"

productos.forEach((p,i)=>{

if(cantidades[i]>0){
pedido+=cantidades[i]+" "+p.nombre+"%0A"
}

})

window.open(`https://wa.me/${telefono}?text=${pedido}`)

}

renderMenu()

</script>

</body>
</html>
