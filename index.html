<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Deluxe</title>
<style>
/* === General === */
html, body {margin:0; padding:0; height:100%; font-family:'Arial', sans-serif; background:#FFF8E7; color:#5B3A29;}
header{background:#D9822B; text-align:center; padding:25px 0; color:white; box-shadow:0 4px 6px rgba(0,0,0,0.2);}
header h1{margin:0; font-size:28px; font-weight:bold;}

/* Categorías */
#categorias{display:flex; justify-content:center; gap:15px; margin:15px 0; flex-wrap:wrap;}
.categoria-btn{padding:10px 20px; border-radius:20px; border:none; cursor:pointer; color:white; background:#B55A1B; font-weight:bold; transition:0.2s;}
.categoria-btn.active{background:#D9822B;}
.categoria-btn:hover{transform:scale(1.05);}

/* Contenedor de menú con scroll */
#menu-container{padding:15px; padding-bottom:180px; height:calc(100% - 120px); overflow-y:auto; transition:0.3s;}

/* Productos */
.product{display:flex; justify-content:space-between; background:white; padding:10px; border-radius:12px; margin-top:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition:transform 0.2s; position:relative; overflow:hidden;}
.product:hover{transform:scale(1.02);}
.product-info{display:flex; flex-direction:column; max-width:60%;}
.product-info .name{font-weight:bold; font-size:16px;}
.product-info .desc{font-size:13px; color:#7A5A42; margin-top:3px;}
.product-info .price{font-size:15px; color:#D9822B; margin-top:5px;}
.product-img{width:60px; height:60px; border-radius:8px; margin-right:10px; object-fit:cover;}

/* Controles +/− */
.controls{display:flex; align-items:center; gap:10px;}
.controls button{padding:5px 12px; border:none; border-radius:6px; cursor:pointer; background:#D9822B; color:white; font-weight:bold; transition:0.15s;}
.controls button:hover{background:#B55A1B;}
.qty{min-width:25px; text-align:center; font-weight:bold;}

/* Animación burbuja */
.bubble{
    position:absolute;
    border-radius:50%;
    width:25px; height:25px;
    background:#D9822B;
    color:white;
    text-align:center;
    line-height:25px;
    font-size:14px;
    font-weight:bold;
    animation:rise 1s ease-out forwards;
}
@keyframes rise{
    0%{opacity:1; transform:translateY(0) scale(1);}
    100%{opacity:0; transform:translateY(-50px) scale(1.5);}
}

/* Carrito */
.cart{position:fixed; bottom:0; left:0; right:0; background:#F5E6D3; padding:15px; display:flex; flex-direction:column; align-items:center; gap:10px; box-shadow:0 -2px 6px rgba(0,0,0,0.1);}
.cart-summary{width:90%; max-height:150px; overflow-y:auto; background:white; border-radius:10px; padding:10px;}
.cart-summary ul{padding:0; margin:0; list-style:none;}
.cart-summary li{margin-bottom:5px; color:#5B3A29;}
textarea{width:90%; padding:10px; border-radius:8px; border:1px solid #D9822B; resize:none; font-size:14px; background:#FFF8E7; color:#5B3A29;}
.orderbtn{padding:12px 25px; border-radius:30px; border:none; background:#5B3A29; color:white; cursor:pointer; font-size:18px; width:90%; font-weight:bold; transition:0.2s;}
.orderbtn:hover{background:#7A5A42;}
#entrega{display:flex; justify-content:center; gap:10px; margin-top:10px;}
.entrega-btn{padding:8px 15px; border-radius:20px; border:none; background:#D9822B; color:white; cursor:pointer; transition:0.2s; font-weight:bold;}
.entrega-btn.active{background:#B55A1B;}
.entrega-btn:hover{transform:scale(1.05);}

/* Responsive */
@media(max-width:600px){
  .product-info{max-width:55%;}
  .categoria-btn{padding:8px 12px; font-size:14px;}
  .product-img{width:50px; height:50px;}
}
</style>
</head>
<body>

<header>
  <h1>CENADURÍA DON APULEYO</h1>
</header>

<div id="categorias">
  <button class="categoria-btn active" data-cat="Hamburguesas">Hamburguesas</button>
  <button class="categoria-btn" data-cat="Hot Dog">Hot Dog</button>
  <button class="categoria-btn" data-cat="Postres">Postres</button>
  <button class="categoria-btn" data-cat="Quesadillas fritas">Quesadillas fritas</button>
  <button class="categoria-btn" data-cat="Antojito Mexicano">Antojito Mexicano</button>
</div>

<div id="menu-container">
  <div id="menu"></div>
</div>

<div class="cart">
  <div class="cart-summary"><ul id="cart-list"></ul></div>
  <div>Total: $<span id="total">0</span></div>
  <textarea id="comentarios" rows="2" placeholder="Comentarios o especificaciones"></textarea>
  <div id="entrega">
    <button class="entrega-btn active" data-type="llevar">Para llevar</button>
    <button class="entrega-btn" data-type="domicilio">Entrega a domicilio</button>
    <button class="entrega-btn" data-type="sitio">Para el sitio</button>
  </div>
  <button class="orderbtn" id="enviarPedidoBtn">Enviar pedido</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const telefono="521XXXXXXXXXX"; // Cambia por tu número

const productos=[
{cat:"Hamburguesas",nombre:"Sencilla",desc:"Carne, lechuga y tomate",precio:65,img:"https://i.imgur.com/5K7BReZ.jpg"},
{cat:"Hamburguesas",nombre:"Hawaiana",desc:"Carne, piña y queso",precio:65,img:"https://i.imgur.com/5K7BReZ.jpg"},
{cat:"Hamburguesas",nombre:"Especial",desc:"Carne, tocino, queso y jalapeño",precio:65,img:"https://i.imgur.com/5K7BReZ.jpg"},
{cat:"Hot Dog",nombre:"Sencillo",desc:"Salchicha y pan fresco",precio:18,img:"https://i.imgur.com/FyOcl4K.jpg"},
{cat:"Hot Dog",nombre:"Con tocino o queso",desc:"Salchicha, tocino o queso",precio:20,img:"https://i.imgur.com/FyOcl4K.jpg"},
{cat:"Hot Dog",nombre:"Con tocino y queso",desc:"Salchicha, tocino y queso",precio:23,img:"https://i.imgur.com/FyOcl4K.jpg"},
{cat:"Postres",nombre:"Fresas con crema",desc:"Fresas frescas con crema",precio:25,img:"https://i.imgur.com/6oZk6M3.jpg"},
{cat:"Postres",nombre:"Duraznos con crema",desc:"Duraznos en almíbar con crema",precio:25,img:"https://i.imgur.com/6oZk6M3.jpg"},
{cat:"Postres",nombre:"Pay de limón",desc:"Con merengue y base de galleta",precio:20,img:"https://i.imgur.com/6oZk6M3.jpg"},
{cat:"Postres",nombre:"Cheesecake oreo",desc:"Base de galleta y crema de oreo",precio:25,img:"https://i.imgur.com/6oZk6M3.jpg"},

// Quesadillas fritas
{cat:"Quesadillas fritas",nombre:"Queso",desc:"Queso derretido",precio:18,img:"https://i.imgur.com/9WqF4nZ.jpg"},
{cat:"Quesadillas fritas",nombre:"Pollo",desc:"Pollo deshebrado",precio:18,img:"https://i.imgur.com/9WqF4nZ.jpg"},
{cat:"Quesadillas fritas",nombre:"Chicharrón",desc:"Chicharrón prensado",precio:18,img:"https://i.imgur.com/9WqF4nZ.jpg"},
{cat:"Quesadillas fritas",nombre:"Champiñones",desc:"Con champiñones frescos",precio:18,img:"https://i.imgur.com/9WqF4nZ.jpg"},
{cat:"Quesadillas fritas",nombre:"Res",desc:"Carne de res",precio:20,img:"https://i.imgur.com/9WqF4nZ.jpg"},

// Antojito Mexicano
{cat:"Antojito Mexicano",nombre:"Tlacoyos",desc:"Masa rellena tradicional",precio:12,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Sope sencillo",desc:"Base de masa con frijol y salsa",precio:20,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Sope con suadero",desc:"Base con carne de suadero",precio:35,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Sope con longaniza",desc:"Base con longaniza",precio:40,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Sope campechano",desc:"Base con varias carnes",precio:40,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Huarache sencillo",desc:"Base de masa larga",precio:25,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Huarache con suadero",desc:"Base con suadero",precio:45,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Huarache con longaniza",desc:"Base con longaniza",precio:50,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Huarache campechano",desc:"Base con varias carnes",precio:50,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Tacos suadero",desc:"Taco de suadero",precio:15,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Tacos longaniza",desc:"Taco de longaniza",precio:15,img:"https://i.imgur.com/1qF5kZS.jpg"},
{cat:"Antojito Mexicano",nombre:"Tacos campechano",desc:"Taco mixto",precio:15,img:"https://i.imgur.com/1qF5kZS.jpg"}
];

let cantidades=new Array(productos.length).fill(0);
let categoriaActual="Hamburguesas";

function renderProductos(){
  const menu=document.getElementById("menu");
  menu.innerHTML="";
  productos.forEach((p,i)=>{
    if(p.cat===categoriaActual){
      const div=document.createElement("div");
      div.className="product";
      div.innerHTML=`
        <img class="product-img" src="${p.img}" alt="${p.nombre}">
        <div class="product-info">
          <div class="name">${p.nombre}</div>
          <div class="desc">${p.desc}</div>
          <div class="price">$${p.precio}</div>
        </div>
        <div class="controls">
          <button data-index="${i}" class="restar">-</button>
          <span id="q${i}" class="qty">${cantidades[i]}</span>
          <button data-index="${i}" class="sumar">+</button>
        </div>
      `;
      menu.appendChild(div);
    }
  });

  document.querySelectorAll(".sumar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      cantidades[i]++;
      document.getElementById("q"+i).innerText=cantidades[i];
      actualizarCarrito();
      crearBurbuja(btn,"+1");
    });
  });
  document.querySelectorAll(".restar").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const i=parseInt(btn.dataset.index);
      if(cantidades[i]>0){ 
        cantidades[i]--; 
        document.getElementById("q"+i).innerText=cantidades[i]; 
        actualizarCarrito(); 
        crearBurbuja(btn,"-1");
      }
    });
  });
}

function crearBurbuja(element,text){
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;
  element.parentElement.appendChild(bubble);
  setTimeout(()=>{bubble.remove();},1000);
}

function actualizarCarrito(){
  const cartList=document.getElementById("cart-list");
  cartList.innerHTML="";
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      cartList.innerHTML+=`<li>${cantidades[i]} x ${p.nombre} - $${cantidades[i]*p.precio}</li>`;
      total+=cantidades[i]*p.precio;
    }
  });
  document.getElementById("total").innerText=total;
}

function enviarPedido(){
  let tipoEntrega=document.querySelector(".entrega-btn.active").innerText;
  let pedido=`Hola, quiero pedir (${tipoEntrega}):%0A`;
  let total=0;
  productos.forEach((p,i)=>{
    if(cantidades[i]>0){
      pedido+=cantidades[i]+" "+p.nombre+" - $"+(cantidades[i]*p.precio)+"%0A";
      total+=cantidades[i]*p.precio;
    }
  });
  pedido+="Total: $"+total+"%0A";
  const comentarios=document.getElementById("comentarios").value;
  if(comentarios.trim()!=""){ pedido+="Comentarios: "+comentarios; }
  window.open(`https://wa.me/${telefono}?text=${pedido}`);
}

// Categorías
document.querySelectorAll(".categoria-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".categoria-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    categoriaActual=btn.dataset.cat;
    renderProductos();
  });
});

// Tipo de entrega
document.querySelectorAll(".entrega-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".entrega-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("enviarPedidoBtn").addEventListener("click", enviarPedido);

renderProductos();
});
</script>
</body>
</html>
