<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #E32636;
  --bg: #FDFDFD;
  --card: #FFFFFF;
  --text: #2D3436;
  --text-light: #636E72;
  --accent: #FF9F43; /* Color para "Popular" */
}

/* Modo Oscuro Automático */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --card: #1E1E1E;
    --text: #F5F6FA;
    --text-light: #A0A0A0;
  }
}

body {
  margin:0; font-family: 'Outfit', sans-serif; 
  background: var(--bg); color: var(--text);
  transition: background 0.3s;
}

header {
  background: var(--card); padding: 25px;
  text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05);
}

header h1 { margin:0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

#categorias {
  display: flex; overflow-x: auto; gap: 10px; padding: 15px;
  background: var(--card); sticky; top: 0; z-index: 100;
}
#categorias::-webkit-scrollbar { display: none; }

.categoria-btn {
  flex: 0 0 auto; padding: 8px 18px; border-radius: 50px;
  border: 1px solid rgba(0,0,0,0.05); background: var(--card);
  color: var(--text-light); cursor: pointer; transition: 0.3s;
}
.categoria-btn.active {
  background: var(--primary); color: white; border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(227, 38, 54, 0.2);
}

#menu-container { padding: 15px; padding-bottom: 300px; }

/* Estilo de Producto */
.product {
  background: var(--card); padding: 15px; border-radius: 24px;
  margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
  position: relative; border: 1px solid rgba(0,0,0,0.02);
}

.badge-popular {
  position: absolute; top: 10px; left: 10px; background: var(--accent);
  color: white; font-size: 10px; padding: 4px 8px; border-radius: 8px;
  font-weight: 700; z-index: 1;
}

.product-content { display: flex; align-items: center; }
.product-img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; margin-right: 15px; }
.product-info { flex: 1; }
.product-info .name { font-weight: 700; font-size: 17px; margin-bottom: 2px; }
.product-info .desc { font-size: 13px; color: var(--text-light); }
.product-info .price { font-weight: 700; color: var(--primary); margin-top: 5px; }

/* Extras */
.extras-container {
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.1);
  display: flex; gap: 8px; flex-wrap: wrap;
}
.extra-pill {
  font-size: 11px; padding: 4px 10px; border-radius: 10px;
  background: rgba(0,0,0,0.05); cursor: pointer; border: 1px solid transparent;
}
.extra-pill.selected { border-color: var(--primary); color: var(--primary); background: rgba(227, 38, 54, 0.1); }

/* Controles */
.controls { display: flex; align-items: center; background: rgba(0,0,0,0.04); border-radius: 12px; padding: 4px; }
.controls button { width: 30px; height: 30px; border: none; border-radius: 10px; background: var(--card); color: var(--text); cursor: pointer; font-weight: bold; }

/* Carrito */
.cart {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); padding: 20px;
  border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
}

.orderbtn {
  width: 100%; padding: 18px; border-radius: 20px; border: none;
  background: #ccc; color: white; font-size: 16px; font-weight: 700;
  transition: 0.3s;
}
.orderbtn.ready { 
    background: var(--primary); 
    animation: pulse 2s infinite; 
    cursor: pointer;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

.total-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; font-weight: 700; }

textarea {
  width: 100%; box-sizing: border-box; padding: 12px; border-radius: 15px;
  border: 1px solid rgba(0,0,0,0.1); background: var(--bg); color: var(--text); margin-bottom: 15px;
}
</style>
</head>
<body>

<header>
  <h1>Cenaduría Don Apuleyo</h1>
</header>

<div id="categorias">
  <button class="categoria-btn active" data-cat="Hamburguesas">Hamburguesas</button>
  <button class="categoria-btn" data-cat="Hot Dog">Hot Dog</button>
  <button class="categoria-btn" data-cat="Postres">Postres</button>
  <button class="categoria-btn" data-cat="Quesadillas fritas">Quesadillas</button>
</div>

<div id="menu-container"></div>

<div class="cart">
  <div class="total-row">
    <span>Total a pagar:</span>
    <span>$<span id="total">0</span></span>
  </div>
  <textarea id="comentarios" rows="2" placeholder="Notas: ¿Sin cebolla? ¿Cambio de $200?"></textarea>
  <button class="orderbtn" id="enviarPedidoBtn">Agregar productos</button>
</div>

<script>
const telefono = "521XXXXXXXXXX"; 
const productos = [
  {id:0, cat:"Hamburguesas", nombre:"Sencilla", desc:"Carne, lechuga y tomate", precio:65, popular:true, img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200", extras:[{n:"Queso Extra", p:10}, {n:"Tocino", p:15}]},
  {id:1, cat:"Hamburguesas", nombre:"Hawaiana", desc:"Carne, piña y queso", precio:65, popular:false, img:"https://images.unsplash.com/photo-1550317138-10000687ad32?w=200", extras:[{n:"Doble Piña", p:10}]},
  {id:2, cat:"Hot Dog", nombre:"Sencillo", desc:"Salchicha clásica", precio:18, popular:true, img:"https://images.unsplash.com/photo-1612392062631-94dd858cba88?w=200", extras:[]},
  {id:3, cat:"Postres", nombre:"Fresas con crema", desc:"Fresas dulces", precio:25, popular:false, img:"https://images.unsplash.com/photo-1590080874088-eec64895b423?w=200", extras:[]}
];

let carrito = {}; 
let categoriaActual = "Hamburguesas";

function renderProductos(){
  const container = document.getElementById("menu-container");
  container.innerHTML = "";
  productos.filter(p => p.cat === categoriaActual).forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    const badge = p.popular ? `<div class="badge-popular">🔥 EL MÁS PEDIDO</div>` : '';
    
    // Generar botones de extras
    let extrasHtml = '';
    if(p.extras.length > 0) {
        extrasHtml = `<div class="extras-container">`;
        p.extras.forEach(ex => {
            const isSel = carrito[p.id]?.extras?.includes(ex.n);
            extrasHtml += `<div class="extra-pill ${isSel?'selected':''}" onclick="toggleExtra(${p.id}, '${ex.n}', ${ex.p})">+ ${ex.n} ($${ex.p})</div>`;
        });
        extrasHtml += `</div>`;
    }

    div.innerHTML = `
        ${badge}
        <div class="product-content">
            <img class="product-img" src="${p.img}">
            <div class="product-info">
                <div class="name">${p.nombre}</div>
                <div class="desc">${p.desc}</div>
                <div class="price">$${p.precio}</div>
            </div>
            <div class="controls">
                <button onclick="updateQty(${p.id}, -1)">-</button>
                <span class="qty">${carrito[p.id]?.qty || 0}</span>
                <button onclick="updateQty(${p.id}, 1)">+</button>
            </div>
        </div>
        ${extrasHtml}
    `;
    container.appendChild(div);
  });
}

function updateQty(id, delta){
    if(!carrito[id]) carrito[id] = {qty: 0, extras: [], extraPrice: 0};
    carrito[id].qty = Math.max(0, carrito[id].qty + delta);
    if(carrito[id].qty === 0) delete carrito[id];
    actualizarInterfaz();
}

function toggleExtra(id, extraNombre, precio){
    if(!carrito[id] || carrito[id].qty === 0) return alert("Primero añade el producto");
    const idx = carrito[id].extras.indexOf(extraNombre);
    if(idx > -1) {
        carrito[id].extras.splice(idx, 1);
        carrito[id].extraPrice -= precio;
    } else {
        carrito[id].extras.push(extraNombre);
        carrito[id].extraPrice += precio;
    }
    actualizarInterfaz();
}

function actualizarInterfaz(){
    let total = 0;
    for(let id in carrito){
        const p = productos.find(x => x.id == id);
        total += (p.precio + carrito[id].extraPrice) * carrito[id].qty;
    }
    document.getElementById("total").innerText = total;
    const btn = document.getElementById("enviarPedidoBtn");
    if(total > 0){
        btn.innerText = "Enviar pedido por WhatsApp";
        btn.classList.add("ready");
    } else {
        btn.innerText = "Agregar productos";
        btn.classList.remove("ready");
    }
    renderProductos();
}

function enviarPedido(){
    let total = document.getElementById("total").innerText;
    if(total == "0") return;

    let mensaje = `*NUEVO PEDIDO - DON APULEYO*%0A------------------------------%0A`;
    for(let id in carrito){
        const p = productos.find(x => x.id == id);
        mensaje += `• ${carrito[id].qty}x ${p.nombre}`;
        if(carrito[id].extras.length > 0) mensaje += ` _(Extras: ${carrito[id].extras.join(", ")})_`;
        mensaje += ` - $${(p.precio + carrito[id].extraPrice) * carrito[id].qty}%0A`;
    }
    const notas = document.getElementById("comentarios").value;
    if(notas) mensaje += `%0A*Notas:* ${notas}`;
    mensaje += `%0A------------------------------%0A*TOTAL A PAGAR: $${total}*`;
    
    window.open(`https://wa.me/${telefono}?text=${mensaje}`);
}

document.querySelectorAll(".categoria-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".categoria-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    categoriaActual = btn.dataset.cat;
    renderProductos();
  });
});

document.getElementById("enviarPedidoBtn").addEventListener("click", enviarPedido);
renderProductos();
</script>
</body>
</html>
