<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cenaduría Don Apuleyo</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#D90429;
--secondary:#FFB703;
--dark:#1A1A1A;
--bg:#F8F8F8;
--card:#FFFFFF;
}

body{
margin:0;
font-family:'Outfit',sans-serif;
background:var(--bg);
color:var(--dark);
}

/* HEADER */

header{
text-align:center;
padding:25px;
background:white;
border-bottom:4px solid var(--primary);
}

.logo{
font-size:30px;
font-weight:800;
color:var(--primary);
}

/* STATUS */

.status{
margin-top:10px;
font-size:12px;
font-weight:700;
}

.open{color:#2E7D32;}
.closed{color:#C62828;}

/* CATEGORIAS */

#cats{
display:flex;
overflow:auto;
gap:10px;
padding:15px;
background:white;
position:sticky;
top:0;
z-index:10;
}

.cat{
flex:0 0 auto;
padding:10px 16px;
border-radius:20px;
border:1px solid #eee;
font-weight:700;
font-size:13px;
background:white;
}

.cat.active{
background:var(--primary);
color:white;
}

/* MENU */

#menu{
padding:15px;
padding-bottom:180px;
}

.product{
background:white;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,.05);
transition:.15s;
}

.product:active{
transform:scale(.98);
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-weight:700;
font-size:18px;
}

.desc{
font-size:13px;
color:#777;
margin-top:4px;
}

.controls{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.price{
font-weight:800;
color:var(--primary);
font-size:20px;
}

.qtybox{
display:flex;
gap:10px;
align-items:center;
}

.qtybox button{
width:32px;
height:32px;
border:none;
background:var(--primary);
color:white;
border-radius:10px;
font-weight:800;
font-size:18px;
}

.qty{
font-weight:800;
}

/* EXTRAS */

.extras{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

.extra{
font-size:11px;
padding:6px 10px;
background:#f4f4f4;
border-radius:10px;
border:1px solid transparent;
}

.extra.sel{
border-color:var(--primary);
color:var(--primary);
}

/* CARRITO */

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-radius:30px 30px 0 0;
padding:20px;
box-shadow:0 -10px 40px rgba(0,0,0,.1);
}

.total{
display:flex;
justify-content:space-between;
font-size:20px;
font-weight:800;
}

textarea{
width:100%;
margin-top:10px;
border-radius:12px;
padding:10px;
border:1px solid #eee;
resize:none;
}

.types{
display:flex;
gap:8px;
margin-top:10px;
}

.type{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #eee;
font-size:12px;
font-weight:700;
}

.type.active{
background:var(--dark);
color:white;
}

.order{
margin-top:12px;
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:var(--primary);
color:white;
font-weight:800;
font-size:16px;
}

.badge{
position:absolute;
background:var(--secondary);
font-size:10px;
padding:4px 10px;
border-radius:10px;
margin:10px;
font-weight:800;
}

</style>
</head>

<body>

<header>

<div class="logo">DON APULEYO</div>

<div id="status" class="status"></div>

</header>

<div id="cats"></div>

<div id="menu"></div>

<div class="cart">

<div class="total">
<span>Total</span>
<span>$<span id="total">0</span></span>
</div>

<textarea id="obs" placeholder="Notas o dirección"></textarea>

<div class="types">
<button class="type active" data="Llevar">Llevar</button>
<button class="type" data="Domicilio">Domicilio</button>
<button class="type" data="En sitio">En sitio</button>
</div>

<button class="order" onclick="send()">PEDIR POR WHATSAPP</button>

</div>

<script>

const WA="521XXXXXXXXXX"

const menu=[

{id:1,c:"Antojitos",n:"Tlacoyo",d:"Frijol o haba",p:12,pop:1,img:""},
{id:2,c:"Antojitos",n:"Taco suadero",d:"Doble tortilla",p:14,img:""},
{id:3,c:"Hamburguesas",n:"Hamburguesa",d:"100% res",p:55,ex:[{n:"Queso",p:10}]},
{id:4,c:"Postres",n:"Fresas crema",d:"Especial",p:25,pop:1},
{id:5,c:"Bebidas",n:"Refresco",d:"600ml",p:25}

]

let cart={}
let cat="Antojitos"

function horario(){

let h=new Date()
let d=h.getDay()
let hr=h.getHours()

let open=[5,6,0].includes(d)&&hr>=20&&hr<23

let s=document.getElementById("status")

if(open){
s.innerText="● ABIERTO"
s.className="status open"
}else{
s.innerText="● CERRADO (Vie-Dom 8-11)"
s.className="status closed"
}

return open
}

function init(){

let c=[...new Set(menu.map(x=>x.c))]

let box=document.getElementById("cats")

c.forEach(a=>{

let b=document.createElement("button")
b.className="cat"+(a==cat?" active":"")
b.innerText=a

b.onclick=()=>{
cat=a
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
render()
window.scrollTo({top:0,behavior:"smooth"})
}

box.appendChild(b)

})

render()
horario()

}

function render(){

let m=document.getElementById("menu")
m.innerHTML=""

menu.filter(x=>x.c==cat).forEach(p=>{

let q=cart[p.id]?.q||0

let div=document.createElement("div")
div.className="product"

let badge=p.pop?`<div class="badge">POPULAR</div>`:""

let img=p.img?`<img src="${p.img}">`:""

let ex=""

if(p.ex){

ex=`<div class="extras">`+

p.ex.map(e=>`<div class="extra ${cart[p.id]?.ex?.includes(e.n)?"sel":""}" onclick="toggle(${p.id},'${e.n}',${e.p})">+${e.n} $${e.p}</div>`).join("")

+`</div>`

}

div.innerHTML=`

${badge}
${img}

<div class="info">

<div class="name">${p.n}</div>
<div class="desc">${p.d}</div>

<div class="controls">

<div class="price">$${p.p}</div>

<div class="qtybox">
<button onclick="add(${p.id},-1)">-</button>
<div class="qty">${q}</div>
<button onclick="add(${p.id},1)">+</button>
</div>

</div>

${ex}

</div>
`

m.appendChild(div)

})

}

function add(id,d){

if(!cart[id])cart[id]={q:0,ex:[],ep:0}

cart[id].q=Math.max(0,cart[id].q+d)

if(cart[id].q==0)delete cart[id]

refresh()

}

function toggle(id,n,p){

if(!cart[id])return

let i=cart[id].ex.indexOf(n)

if(i>-1){
cart[id].ex.splice(i,1)
cart[id].ep-=p
}else{
cart[id].ex.push(n)
cart[id].ep+=p
}

refresh()

}

function refresh(){

let t=0

for(let id in cart){

let item=menu.find(x=>x.id==id)

t+=(item.p+cart[id].ep)*cart[id].q

}

document.getElementById("total").innerText=t

render()

}

function send(){

if(!horario()){
alert("Estamos cerrados")
return
}

let total=document.getElementById("total").innerText

if(total==0)return

let type=document.querySelector(".type.active").dataset

let notes=document.getElementById("obs").value

let txt="*DON APULEYO*%0A%0A"

for(let id in cart){

let item=menu.find(x=>x.id==id)

txt+=`${cart[id].q}x ${item.n}%0A`

}

txt+=`%0ATotal $${total}`

window.open(`https://wa.me/${WA}?text=${txt}`)

}

document.querySelectorAll(".type").forEach(b=>{

b.onclick=()=>{
document.querySelectorAll(".type").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
}

})

init()

</script>

</body>
</html>
