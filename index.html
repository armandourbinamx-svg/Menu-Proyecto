<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cenaduría Don Apuleyo - Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #D90429; /* Rojo Intenso */
  --secondary: #FFB703; /* Amarillo Premium */
  --success: #2ECC71;
  --dark: #1A1A1A;
  --bg: #FDFDFD;
}

body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 120px; }

/* HEADER Y LOGO */
header { background: #fff; padding: 30px 15px; text-align: center; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.logo-circle { width: 65px; height: 65px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; box-shadow: 0 6px 20px rgba(217, 4, 41, 0.3); }
.logo-text { font-weight: 800; font-size: 28px; color: white; }
.logo-text span { color: var(--secondary); }
header h1 { margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
.status-pill { display: inline-block; font-size: 10px; padding: 5px 15px; border-radius: 20px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
.open { background: rgba(46,204,113,0.1); color: var(--success); }
.closed { background: rgba(217, 4, 41, 0.1); color: var(--primary); }

/* PRODUCTOS */
#menu-container { padding: 15px; }
.card { background: #fff; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #f0f0f0; box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; }
.card-info { flex: 1; }
.card-name { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
.card-price { font-weight: 800; color: var(--primary); font-size: 19px; }
.controls { display: flex; align-items: center; background: #F5F5F5; border-radius: 12px; padding: 4px; gap: 12px; }
.controls button { width: 35px; height: 35px; border: none; border-radius: 10px; background: var(--primary); color: #fff; font-weight: 800; font-size: 20px; }
.qty-val { font-weight: 800; min-width: 20px; text-align: center; }

/* SECCIÓN DE DIRECCIÓN */
footer { padding: 30px 20px; background: #f0f0f0; text-align: center; border-top: 1px solid #ddd; }
.address-box { font-size: 14px; color: #555; line-height: 1.5; margin-bottom: 15px; }
.maps-btn { display: inline-block; padding: 12px 25px; background: var(--dark); color: white; text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 12px; transition: 0.3s; }

/* CARRITO FLOTANTE */
.cart-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 20px; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); z-index: 1000; }
.order-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: #ccc; color: #fff; font-weight: 800; font-size: 16px; transition: 0.3s; }
.order-btn.active { background: var(--primary); box-shadow: 0 10px 25px rgba(217, 4, 41, 0.3); }
</style>
</head>
<body>

<header>
  <div class="logo-circle"><div class="logo-text">D<span>A</span></div></div>
  <h1>Cenaduría Don Apuleyo</h1>
  <div id="status" class="status-pill">Verificando...</div>
</header>

<div id="menu-container">
  </div>

<footer>
  <div class="address-box">
    <strong>📍 Nuestra Ubicación:</strong><br>
    Av. Independencia No. 73, Santiago, Tezoyuca
  </div>
  <a href="https://www.google.com/maps?q=Av.+Independencia+73,+Santiago,+Tezoyuca" target="_blank" class="maps-btn">
    🗺️ CÓMO LLEGAR (GOOGLE MAPS)
  </a>
</footer>

<div class="cart-panel">
  <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:800; font-size:20px;">
    <span style="color:#888;">Total:</span>
    <span style="color:var(--primary);">$<span id="total-val">0</span></span>
  </div>
  <button id="btn-pedido" class="order-btn">Selecciona productos</button>
</div>

<script>
const CONFIG = {
  tel: "521XXXXXXXXXX", // Tu número aquí
  dias: [5, 6, 0], // Vie, Sáb, Dom
  apertura: 20, // 8 PM
  cierre: 23    // 11 PM
};

const productos = [
  {id:1, n:"Tlacoyo", p:12, d:"Frijol o haba"},
  {id:2, n:"Huarache Suadero", p:45, d:"Con quesillo"},
  {id:3, n:"Hamburguesa Sencilla", p:55, d:"Carne 100% res"},
  {id:4, n:"Hamburguesa Hawaiana", p:65, d:"Piña y doble queso"},
  {id:5, n:"Fresas con Crema", p:25, d:"Especialidad"}
];

let carrito = {};

function checkHorario() {
  const ahora = new Date();
  const esDia = CONFIG.dias.includes(ahora.getDay());
  const esHora = ahora.getHours() >= CONFIG.apertura && ahora.getHours() < CONFIG.cierre;
  const abierto = esDia && esHora;
  
  const el = document.getElementById("status");
  el.innerText = abierto ? "● Abierto Ahora" : "● Cerrado - Abrimos Vie-Dom (8-11 PM)";
  el.className = `status-pill ${abierto ? 'open' : 'closed'}`;
  return abierto;
}

function render() {
  const container = document.getElementById("menu-container");
  container.innerHTML = productos.map(p => `
    <div class="card">
      <div class="card-info">
        <div class="card-name">${p.n}</div>
        <div style="font-size:12px; color:#777;">${p.d}</div>
        <div class="card-price">$${p.p}</div>
      </div>
      <div class="controls">
        <button onclick="upd(${p.id},-1)">-</button>
        <span class="qty-val">${carrito[p.id] || 0}</span>
        <button onclick="upd(${p.id},1)">+</button>
      </div>
    </div>
  `).join('');
}

function upd(id, delta) {
  if(!checkHorario()) return alert("Solo tomamos pedidos en horario de servicio (Vie-Dom, 8-11 PM)");
  carrito[id] = Math.max(0, (carrito[id] || 0) + delta);
  if(carrito[id] === 0) delete carrito[id];
  
  let total = 0;
  for(let key in carrito) total += productos.find(p => p.id == key).p * carrito[key];
  
  document.getElementById("total-val").innerText = total;
  const btn = document.getElementById("btn-pedido");
  if(total > 0) {
    btn.innerText = "PEDIR POR WHATSAPP";
    btn.classList.add("active");
    btn.onclick = enviar;
  } else {
    btn.innerText = "Selecciona productos";
    btn.classList.remove("active");
  }
  render();
}

function enviar() {
  let msg = `*DON APULEYO - PEDIDO*%0A%0A`;
  for(let id in carrito) {
    const p = productos.find(x => x.id == id);
    msg += `• *${carrito[id]}x ${p.n}* -> $${p.p * carrito[id]}%0A`;
  }
  msg += `%0A*TOTAL: $${document.getElementById("total-val").innerText}*%0A_Ubicación: Av. Independencia 73_`;
  window.open(`https://wa.me/${CONFIG.tel}?text=${msg}`);
}

render();
checkHorario();
</script>
</body>
</html>
