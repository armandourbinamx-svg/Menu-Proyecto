<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Menú Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* Variables de Color */
:root {
  --primary: #E32636; /* Rojo elegante */
  --primary-dark: #B91D2A;
  --bg: #FDFDFD;
  --text-dark: #2D3436;
  --text-light: #636E72;
  --white: #FFFFFF;
  --shadow: 0 10px 20px rgba(0,0,0,0.05);
}

body {
  margin:0; padding:0; font-family: 'Outfit', sans-serif; 
  background: var(--bg); color: var(--text-dark);
}

/* Header Moderno */
header {
  background: var(--white); padding: 30px 20px;
  text-align: center; border-bottom: 1px solid #F1F1F1;
}
header h1 {
  margin:0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px;
  text-transform: uppercase; color: var(--text-dark);
}

/* Categorías Estilo "Pills" */
#categorias {
  display: flex; overflow-x: auto; gap: 10px; padding: 15px;
  background: var(--white); position: sticky; top: 0; z-index: 100;
}
#categorias::-webkit-scrollbar { display: none; }

.categoria-btn {
  flex: 0 0 auto; padding: 10px 20px; border-radius: 50px;
  border: 1px solid #EEE; background: var(--white);
  color: var(--text-light); font-weight: 400; cursor: pointer;
  transition: all 0.3s ease;
}
.categoria-btn.active {
  background: var(--primary); color: var(--white); border-color: var(--primary);
  box-shadow: 0 4px 10px rgba(227, 38, 54, 0.3);
}

/* Contenedor de Menú */
#menu-container { padding: 15px; padding-bottom: 280px; }

/* Cards de Producto */
.product {
  display: flex; align-items: center; background: var(--white);
  padding: 15px; border-radius: 20px; margin-bottom: 15px;
  box-shadow: var(--shadow); border: 1px solid #F9F9F9;
}
.product-img {
  width: 85px; height: 85px; border-radius: 15px;
  object-fit: cover; margin-right: 15px;
}
.product-info { flex-grow: 1; }
.product-info .name { font-weight: 600; font-size: 17px; margin-bottom: 4px; }
.product-info .desc { font-size: 13px; color: var(--text-light); line-height: 1.3; }
.product-info .price { 
  font-weight: 600; color: var(--primary); margin-top: 8px; font-size: 16px;
}

/* Controles de Cantidad */
.controls { display: flex; align-items: center; background: #F5F5F5; border-radius: 12px; padding: 4px; }
.controls button {
  width: 32px; height: 32px; border: none; border-radius: 8px;
  background: var(--white); font-size: 18px; cursor: pointer;
  transition: 0.2s; display: flex; align-items: center; justify-content: center;
}
.controls button:active { transform: scale(0.9); }
.qty { margin: 0 12px; font-weight: 600; min-width: 15px; text-align: center; }

/* Carrito Inferior */
.cart {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); padding: 20px;
  border-top-left-radius: 30px; border-top-right-radius: 30px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.08); z-index: 1000;
}
.cart-summary {
  max-height: 80px; overflow-y: auto; margin-bottom: 15px;
  font-size: 14px; color: var(--text-light); border-left: 3px solid var(--primary); padding-left: 10px;
}
textarea {
  width: 100%; box-sizing: border-box; padding: 12px; border-radius: 15px;
  border: 1px solid #EEE; background: #F9F9F9; margin-bottom: 15px; font-family: inherit;
}

/* Botones de Entrega */
#entrega { display: flex; gap: 8px; margin-bottom: 15px; }
.entrega-btn {
  flex: 1; padding: 10px 5px; border-radius: 12px; border: 1px solid #EEE;
  background: #F9F9F9; font-size: 12px; cursor: pointer; font-weight: 600;
}
.entrega-btn.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }

.orderbtn {
  width: 100%; padding: 16px; border-radius: 18px; border: none;
  background: var(--primary); color: white; font-size: 17px; font-weight: 600;
  cursor: pointer; transition: 0.3s;
}
.orderbtn:hover { background: var(--primary-dark); }

.total-label { font-size: 20px; font-weight: 600; margin-bottom: 10px; text-align: right; }

/* Burbuja Animada */
.bubble {
  position: absolute; background: var(--primary); color: white;
  width: 24px; height: 24px; border-radius: 50%; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  animation: floatUp 0.6s ease-out forwards; pointer-events: none;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}
</style>
</head>
<body>

<header>
  <h1>Cenaduría Don Apuleyo</h1>
</header>

<div id="categorias">
  <button class="categoria-btn active" data-cat="Hamburguesas">Hamburguesas</button>
  <button class="categoria-btn" data-cat="Hot Dog">Hot Dog</button>
  <button class="categoria-btn" data-cat="Postres">Postres</button>
  <button class="categoria-btn" data-cat="Quesadillas fritas">Quesadillas</button>
  <button class="categoria-btn" data-cat="Antojito Mexicano">Antojitos</button>
</div>

<div id="menu-container"></div>

<div class="cart">
  <div class="cart-summary" id="cart-list">Tu carrito está vacío</div>
  <div class="total-label">Total: $<span id="total">0</span></div>
  
  <div id="entrega">
    <button class="entrega-btn active" data-type="Para llevar">Llevar</button>
    <button class="entrega-btn" data-type="Domicilio">Domicilio</button>
    <button class="entrega-btn" data-type="En sucursal">En sitio</button>
  </div>
  
  <textarea id="comentarios" rows="2" placeholder="¿Algo especial? (ej. sin cebolla)"></textarea>
  <button class="orderbtn" id="enviarPedidoBtn">Confirmar Pedido vía WhatsApp</button>
</div>

<script>
const telefono = "521XXXXXXXXXX"; 
const productos = [
  {cat:"Hamburguesas",nombre:"Sencilla",desc:"Carne jugosa, lechuga y tomate",precio:65,img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=200&auto=format&fit=crop"},
  {cat:"Hamburguesas",nombre:"Hawaiana",desc:"Carne, piña caramelizada y queso",precio:65,img:"https://images.unsplash.com/photo-1550317138-10000687ad32?q=80&w=200&auto=format&fit=crop"},
  {cat:"Hot Dog",nombre:"Sencillo",desc:"Salchicha clásica y pan artesanal",precio:18,img:"https://images.unsplash.com/photo-1612392062631-94dd858cba88?q=80&w=200&auto=format&fit=crop"},
  {cat:"Postres",nombre:"Fresas con crema",desc:"Fresas frescas con crema dulce",precio:25,img:"https://images.unsplash.com/photo-1590080874088-eec64895b423?q=80&w=200&auto=format&fit=crop"},
  {cat:"Quesadillas fritas",nombre:"Queso",desc:"Crujiente quesadilla de queso",precio:18,img:"https://images.unsplash.com/photo-1599974590461-64cf19702b85?q=80&w=200&auto=format&fit=crop"},
  {cat:"Antojito Mexicano",nombre:"Tlacoyos",desc:"Rellenos de frijol o haba",precio:12,img:"https://images.unsplash.com/photo-1625938146369-adc833546318?q=80&w=200&auto=format&fit=crop"}
];

let cantidades = new Array(productos.length).fill(0);
let categoriaActual = "Hamburguesas";
const menuContainer = document.getElementById("menu-container");

function renderProductos(){
  menuContainer.innerHTML = "";
  productos.forEach((p,i) => {
    if(p.cat === categoriaActual){
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <img class="product-img" src="${p.img}" alt="${p.nombre}">
        <div class="product-info">
          <div class="name">${p.nombre}</div>
          <div class="desc">${p.desc}</div>
          <div class="price">$${p.precio}</div>
        </div>
        <div class="controls">
          <button onclick="cambiarCant(${i},-1, event)">-</button>
          <span class="qty">${cantidades[i]}</span>
          <button onclick="cambiarCant(${i},1, event)">+</button>
        </div>
      `;
      menuContainer.appendChild(div);
    }
  });
}

function cambiarCant(index, delta, event){
  if(delta > 0) {
    cantidades[index]++;
    crearBurbuja(event.target, "+1");
  } else if(cantidades[index] > 0) {
    cantidades[index]--;
    crearBurbuja(event.target, "-1");
  }
  renderProductos();
  actualizarCarrito();
}

function crearBurbuja(target, text){
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;
  const rect = target.getBoundingClientRect();
  bubble.style.left = `${rect.left + 10}px`;
  bubble.style.top = `${rect.top}px`;
  document.body.appendChild(bubble);
  setTimeout(() => bubble.remove(), 600);
}

function actualizarCarrito(){
  const cartList = document.getElementById("cart-list");
  let items = [];
  let total = 0;
  productos.forEach((p,i) => {
    if(cantidades[i] > 0){
      items.push(`${cantidades[i]}x ${p.nombre}`);
      total += cantidades[i] * p.precio;
    }
  });
  cartList.innerText = items.length > 0 ? items.join(", ") : "Tu carrito está vacío";
  document.getElementById("total").innerText = total;
}

function enviarPedido(){
  let total = document.getElementById("total").innerText;
  if(total == "0") return alert("¡Agrega algo delicioso primero!");

  let tipoEntrega = document.querySelector(".entrega-btn.active").dataset.type;
  let mensaje = `*NUEVO PEDIDO - DON APULEYO*%0A------------------------------%0A`;
  mensaje += `*Modalidad:* ${tipoEntrega}%0A%0A`;
  
  productos.forEach((p,i) => {
    if(cantidades[i] > 0){
      mensaje += `• ${cantidades[i]} ${p.nombre} ($${cantidades[i]*p.precio})%0A`;
    }
  });
  
  const notas = document.getElementById("comentarios").value;
  if(notas) mensaje += `%0A*Notas:* ${notas}`;
  mensaje += `%0A------------------------------%0A*TOTAL: $${total}*`;
  
  window.open(`https://wa.me/${telefono}?text=${mensaje}`);
}

// Event Listeners
document.querySelectorAll(".categoria-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".categoria-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    categoriaActual = btn.dataset.cat;
    renderProductos();
  });
});

document.querySelectorAll(".entrega-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".entrega-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("enviarPedidoBtn").addEventListener("click", enviarPedido);

renderProductos();
</script>
</body>
</html>
