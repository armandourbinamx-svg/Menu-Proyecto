<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENADURÍA DON APULEYO - Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #D90429; /* Rojo Intenso */
  --secondary: #FFB703; /* Amarillo Premium */
  --dark: #1A1A1A;
  --bg: #FDFDFD;
  --card: #FFFFFF;
}

body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background-color: var(--bg);
  color: var(--dark);
  -webkit-tap-highlight-color: transparent;
}

/* HEADER CON LOGO PREMIUM */
header {
  background: var(--card);
  padding: 30px 15px;
  text-align: center;
  border-bottom: 4px solid var(--primary);
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.logo-circle {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  box-shadow: 0 6px 20px rgba(217, 4, 41, 0.3);
}

.logo-text {
  font-weight: 800;
  font-size: 32px;
  color: white;
  letter-spacing: -1px;
}

.logo-text span { color: var(--secondary); }

header h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 800;
  color: var(--dark);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.tagline {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* CATEGORÍAS CON ICONOS */
#categorias {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 20px 15px;
  background: var(--card);
  position: sticky;
  top: 0;
  z-index: 1000;
}
#categorias::-webkit-scrollbar { display: none; }

.categoria-btn {
  flex: 0 0 auto;
  padding: 12px 20px;
  border-radius: 18px;
  border: 1.5px solid #EEE;
  background: var(--card);
  color: #666;
  font-weight: 700;
  font-size: 13px;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.categoria-btn span { font-size: 20px; }

.categoria-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(217, 4, 41, 0.2);
}

/* PRODUCTOS */
#menu-container { padding: 15px; padding-bottom: 380px; }

.product {
  background: var(--card);
  border-radius: 25px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.04);
  border: 1px solid #F0F0F0;
  position: relative;
}

.badge-pop {
  position: absolute;
  top: -10px;
  left: 20px;
  background: var(--secondary);
  color: #000;
  font-size: 10px;
  font-weight: 800;
  padding: 5px 12px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(255, 183, 3, 0.3);
}

.product-info .name { font-weight: 700; font-size: 18px; margin-bottom: 4px; }
.product-info .desc { font-size: 13px; color: #777; line-height: 1.4; margin-bottom: 12px; }
.product-info .price { font-weight: 800; color: var(--primary); font-size: 20px; }

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

.controls {
  display: flex;
  align-items: center;
  background: #F5F5F5;
  border-radius: 15px;
  padding: 4px;
  gap: 15px;
}

.controls button {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 22px;
  font-weight: 800;
  cursor: pointer;
}

.qty { font-weight: 800; font-size: 18px; min-width: 25px; text-align: center; }

/* EXTRAS */
.extras-box {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 15px;
  padding-top: 15px;
  border-top: 1px dashed #EEE;
}

.extra-pill {
  font-size: 11px;
  font-weight: 700;
  padding: 8px 15px;
  background: #F9F9F9;
  border-radius: 12px;
  color: #555;
  border: 2px solid transparent;
}

.extra-pill.selected {
  border-color: var(--primary);
  color: var(--primary);
  background: #FFF0F1;
}

/* CARRITO */
.cart {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  padding: 25px;
  border-radius: 35px 35px 0 0;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
  z-index: 2000;
}

.total-display {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.total-display span:first-child { font-weight: 600; color: #888; }
.total-display span:last-child { font-weight: 800; font-size: 26px; color: var(--primary); }

.order-btn {
  width: 100%;
  padding: 20px;
  border-radius: 20px;
  border: none;
  background: #DDD;
  color: white;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 1px;
  transition: 0.3s;
}

.order-btn.active {
  background: var(--primary);
  box-shadow: 0 10px 25px rgba(217, 4, 41, 0.3);
}

textarea {
  width: 100%;
  border: 1.5px solid #EEE;
  border-radius: 15px;
  padding: 12px;
  font-family: inherit;
  margin-bottom: 12px;
  box-sizing: border-box;
  font-size: 14px;
}

#delivery-type { display: flex; gap: 10px; margin-bottom: 15px; }
.del-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1.5px solid #EEE;
  background: #F9F9F9;
  font-weight: 700;
  font-size: 11px;
  color: #888;
}
.del-btn.active { background: var(--dark); color: white; border-color: var(--dark); }
</style>
</head>
<body>

<header>
  <div class="logo-circle">
    <div class="logo-text">D<span>A</span></div>
  </div>
  <h1>Cenaduría Don Apuleyo</h1>
  <div class="tagline">Sabor que enamora</div>
</header>

<div id="categorias"></div>
<div id="menu-container"></div>

<div class="cart">
  <div class="total-display">
    <span>Total del pedido</span>
    <span>$<span id="total-val">0</span></span>
  </div>
  
  <textarea id="obs" rows="2" placeholder="Notas (ej. Sin cebolla, traer cambio de $200)"></textarea>
  
  <div id="delivery-type">
    <button class="del-btn active" data-v="Llevar">🛍️ LLEVAR</button>
    <button class="del-btn" data-v="Domicilio">🛵 DOMICILIO</button>
    <button class="del-btn" data-v="En sitio">🍽️ EN SITIO</button>
  </div>
  
  <button class="order-btn" id="sendOrder">Selecciona productos</button>
</div>

<script>
const whatsappNum = "521XXXXXXXXXX";

const menuData = [
  {id:1, c:"Antojitos", i:"🌮", n:"Tlacoyo", d:"Relleno de frijol o haba, con salsa y queso", p:12, pop:true},
  {id:2, c:"Antojitos", i:"🌮", n:"Taco de suadero", d:"Doble tortilla, suadero suave", p:14},
  {id:3, c:"Antojitos", i:"🌮", n:"Huarache Suadero", d:"Tamaño grande con quesillo", p:45, pop:true, ex:[{n:"Quesillo Extra", p:5}]},
  {id:4, c:"Hamburguesas", i:"🍔", n:"Sencilla", d:"Carne 100% res, lechuga y jitomate", p:55, ex:[{n:"Papas Francesa", p:15},{n:"Queso Extra", p:10}]},
  {id:5, c:"Hamburguesas", i:"🍍", n:"Hawaiana", d:"Con piña y doble queso fundido", p:65, pop:true, ex:[{n:"Tocino", p:15}]},
  {id:6, c:"Hot-Dogs", i:"🌭", n:"Sencillo", d:"Salchicha clásica y pan artesanal", p:18},
  {id:7, c:"Pizzas", i:"🍕", n:"Pizza Chica", d:"Peperoni o Hawaiana", p:85},
  {id:8, c:"Postres", i:"🍓", n:"Fresas con Crema", d:"Receta especial de la casa", p:25, pop:true},
  {id:9, c:"Bebidas", i:"🥤", n:"Refresco 600ml", d:"Varios sabores", p:25}
];

let cart = {};
let currentCat = "Antojitos";

function init() {
  const catBox = document.getElementById("categorias");
  const uniqueCats = [...new Set(menuData.map(m => m.c))];
  
  uniqueCats.forEach(catName => {
    const item = menuData.find(m => m.c === catName);
    const b = document.createElement("button");
    b.className = `categoria-btn ${catName === currentCat ? 'active' : ''}`;
    b.innerHTML = `<span>${item.i}</span>${catName}`;
    b.onclick = () => {
      document.querySelectorAll(".categoria-btn").forEach(btn => btn.classList.remove("active"));
      b.classList.add("active");
      currentCat = catName;
      renderMenu();
    };
    catBox.appendChild(b);
  });
  renderMenu();
}

function renderMenu() {
  const container = document.getElementById("menu-container");
  container.innerHTML = "";
  menuData.filter(m => m.c === currentCat).forEach(p => {
    const div = document.createElement("div");
    div.className = "product";
    const badge = p.pop ? `<div class="badge-pop">RECOMENDADO ⭐</div>` : '';
    let exHtml = p.ex ? `<div class="extras-box">` + p.ex.map(e => `<div class="extra-pill ${cart[p.id]?.extras?.includes(e.n)?'selected':''}" onclick="toggleEx(${p.id},'${e.n}',${e.p})">+ ${e.n} ($${e.p})</div>`).join('') + `</div>` : '';

    div.innerHTML = `${badge}<div class="product-info"><div class="name">${p.n}</div><div class="desc">${p.d}</div><div class="controls-row"><div class="price">$${p.p}</div><div class="controls"><button onclick="upd(${p.id},-1)">-</button><span class="qty">${cart[p.id]?.q || 0}</span><button onclick="upd(${p.id},1)">+</button></div></div></div>${exHtml}`;
    container.appendChild(div);
  });
}

function upd(id, delta) {
  if(!cart[id]) cart[id] = {q:0, extras:[], exP:0};
  cart[id].q = Math.max(0, cart[id].q + delta);
  if(cart[id].q === 0) delete cart[id];
  refresh();
}

function toggleEx(id, n, p) {
  if(!cart[id]) return alert("Añade el producto primero");
  const i = cart[id].extras.indexOf(n);
  if(i > -1) { cart[id].extras.splice(i,1); cart[id].exP -= p; }
  else { cart[id].extras.push(n); cart[id].exP += p; }
  refresh();
}

function refresh() {
  let t = 0;
  for(let id in cart) {
    const item = menuData.find(x => x.id == id);
    t += (item.p + cart[id].exP) * cart[id].q;
  }
  document.getElementById("total-val").innerText = t;
  const btn = document.getElementById("sendOrder");
  btn.className = t > 0 ? "order-btn active" : "order-btn";
  btn.innerText = t > 0 ? "PEDIR AHORA POR WHATSAPP" : "Selecciona productos";
  renderMenu();
}

document.getElementById("sendOrder").onclick = () => {
  let val = document.getElementById("total-val").innerText;
  if(val === "0") return;
  let type = document.querySelector(".del-btn.active").dataset.v;
  let text = `*CENADURÍA DON APULEYO*%0A*Entrega:* ${type}%0A%0A`;
  for(let id in cart) {
    const item = menuData.find(x => x.id == id);
    text += `• *${cart[id].q}x ${item.n}*`;
    if(cart[id].extras.length > 0) text += ` _(+${cart[id].extras.join(', ')})_`;
    text += ` -> $${(item.p + cart[id].exP) * cart[id].q}%0A`;
  }
  text += `%0A*Notas:* ${document.getElementById("obs").value}%0A*TOTAL: $${val}*`;
  window.open(`https://wa.me/${whatsappNum}?text=${text}`);
};

document.querySelectorAll(".del-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".del-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  };
});

init();
</script>
</body>
</html>
